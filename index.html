<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Peladeiros - Gestão de Jogo</title>

    <!-- Firebase e Bibliotecas -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --primary: #2c3e50;
            --accent: #27ae60;
            --danger: #e74c3c;
            --waiting: #3498db;
        }

        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .logo { max-width: 50px; border-radius: 50%; }

        /* Estilo das Listas */
        .section-title { font-size: 0.9rem; color: #7f8c8d; text-transform: uppercase; margin: 20px 0 10px; display: flex; justify-content: space-between; }
        .player-list { list-style: none; padding: 0; }
        
        .player-card {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; margin-bottom: 8px; border-radius: 8px;
            cursor: pointer; transition: 0.2s; border: 1px solid #eee;
        }

        /* Cores Dinâmicas */
        .confirmado { background: #e8f5e9; border-left: 5px solid var(--accent); }
        .espera { background: #fff; border-left: 5px solid #bdc3c7; }
        .goleiro-tag { background: #f39c12; color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.6rem; margin-left: 5px; }

        .player-info strong { display: block; font-size: 1rem; color: var(--primary); }
        .player-info span { font-size: 0.75rem; color: #7f8c8d; }
        .price-tag { font-weight: bold; color: var(--accent); }

        /* Botão de Adicionar */
        .add-box { display: flex; gap: 5px; margin-bottom: 20px; }
        .add-box input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 0 15px; border-radius: 8px; font-weight: bold; }

        /* Modal */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); align-items:center; justify-content:center; z-index:100; }
        .modal-content { background:white; padding:20px; border-radius:12px; width:90%; max-width:380px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display:block; font-size: 0.75rem; font-weight:bold; margin-bottom:5px; }
        .input-group input, .input-group select { width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; }

        .btn-save { width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer; }
        .btn-cancel { width:100%; padding:8px; background:#eee; color:#666; border:none; border-radius:8px; margin-top:10px; cursor:pointer; }
        .btn-reset { width:100%; padding:10px; background:var(--danger); color:white; border:none; border-radius:8px; margin-top:20px; font-weight:bold; }
        
        #auth-screen { height: 100vh; display: flex; align-items: center; justify-content: center; background: #222; }
    </style>
</head>
<body>

    <!-- Tela de Login -->
    <div id="auth-screen">
        <div style="background:white; padding:30px; border-radius:15px; text-align:center;">
            <img src="https://i.imgur.com/zSl9YOk.jpeg" style="width:80px; border-radius:50%">
            <h2>Peladeiros</h2>
            <button onclick="loginGoogle()" style="padding:10px 20px; cursor:pointer;">Entrar com Google</button>
        </div>
    </div>

    <!-- App Principal -->
    <div id="app-main" class="container" style="display:none;">
        <header>
            <img src="https://i.imgur.com/zSl9YOk.jpeg" class="logo">
            <h2 style="margin:5px 0 0;">Controle de Caixa</h2>
            <p id="data-atual" style="font-size:0.8rem; color:#666;"></p>
        </header>

        <div class="add-box">
            <input type="text" id="novoNome" placeholder="Nome do novo jogador...">
            <button class="btn-add" onclick="cadastrarNovo()">ADD</button>
        </div>

        <div class="section-title">
            <span>Confirmados (Pagos)</span>
            <span id="count-confirmados" style="color:var(--accent)">0</span>
        </div>
        <ul id="listaConfirmados" class="player-list"></ul>

        <div class="section-title">
            <span>Lista de Espera (Cadastrados)</span>
            <span id="count-espera">0</span>
        </div>
        <ul id="listaEspera" class="player-list"></ul>

        <button class="btn-reset" onclick="zerarPagamentosDia()">🔄 Zerar Pagamentos do Dia</button>
        <p style="font-size:0.6rem; text-align:center; margin-top:10px; color:#999;">* Zerar apenas limpa os valores, mantém os nomes no banco.</p>
    </div>

    <!-- Modal de Pagamento -->
    <div class="modal" id="modalPagamento">
        <div class="modal-content">
            <h3 id="m-nome">Jogador</h3>
            <input type="hidden" id="m-id">
            
            <div class="input-group">
                <label>VALOR PAGO (R$)</label>
                <input type="number" id="m-valor" placeholder="Ex: 15" autofocus>
            </div>

            <div class="input-group">
                <label>FORMA DE PAGAMENTO</label>
                <select id="m-forma">
                    <option value="Pix">❖ PIX</option>
                    <option value="Dinheiro">💵 Dinheiro</option>
                    <option value="Mensalista">🗓️ Mensalista</option>
                </select>
            </div>

            <div class="input-group" style="display:flex; align-items:center; gap:10px;">
                <input type="checkbox" id="m-goleiro" style="width:auto;">
                <label style="margin:0;">É Goleiro?</label>
            </div>

            <button class="btn-save" onclick="confirmarPagamento()">Confirmar e Subir</button>
            <button class="btn-cancel" onclick="fecharModal()">Voltar</button>
            <button onclick="excluirJogador()" style="color:red; background:none; border:none; font-size:0.7rem; margin-top:15px; width:100%; cursor:pointer;">Remover Jogador do Banco</button>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyC9VtX2SWiCtAPtLx6WGmVwUMA-EX_zuAY",
            authDomain: "dbpeladeiros.firebaseapp.com",
            projectId: "dbpeladeiros",
            storageBucket: "dbpeladeiros.firebasestorage.app",
            messagingSenderId: "460398325975",
            appId: "1:460398325975:web:b382791c2d132d1a3d0092"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Autenticação simples
        function loginGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider);
        }

        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-main').style.display = 'block';
                document.getElementById('data-atual').innerText = new Date().toLocaleDateString('pt-BR', {weekday:'long', day:'numeric', month:'long'});
                ouvirBanco();
            }
        });

        // Escuta o banco de dados em tempo real
        function ouvirBanco() {
            db.collection("jogadores").orderBy("nome").onSnapshot(snap => {
                const listaC = document.getElementById('listaConfirmados');
                const listaE = document.getElementById('listaEspera');
                listaC.innerHTML = ""; listaE.innerHTML = "";
                
                let cCount = 0; let eCount = 0;

                snap.forEach(doc => {
                    const j = doc.data();
                    const id = doc.id;
                    const valor = parseFloat(j.valorPago) || 0;
                    const isPago = valor >= 15 || j.goleiro === true;

                    const itemHtml = `
                        <li class="player-card ${isPago ? 'confirmado' : 'espera'}" onclick="abrirModal('${id}', '${j.nome}', ${valor}, ${j.goleiro})">
                            <div class="player-info">
                                <strong>${j.nome} ${j.goleiro ? '<span class="goleiro-tag">GK</span>' : ''}</strong>
                                <span>${isPago ? (j.formaPgto || 'Pago') : 'Aguardando'}</span>
                            </div>
                            <div class="price-tag">${isPago ? 'R$ ' + valor : '---'}</div>
                        </li>
                    `;

                    if (isPago) {
                        listaC.innerHTML += itemHtml;
                        cCount++;
                    } else {
                        listaE.innerHTML += itemHtml;
                        eCount++;
                    }
                });

                document.getElementById('count-confirmados').innerText = cCount;
                document.getElementById('count-espera').innerText = eCount;
            });
        }

        // Cadastra apenas o nome (vai para espera por padrão)
        async function cadastrarNovo() {
            const nome = document.getElementById('novoNome').value.trim();
            if (!nome) return;
            await db.collection("jogadores").add({
                nome: nome,
                valorPago: 0,
                formaPgto: "",
                goleiro: false,
                dataCadastro: new Date()
            });
            document.getElementById('novoNome').value = "";
        }

        // Modal de Alimentação de Dados
        function abrirModal(id, nome, valor, goleiro) {
            document.getElementById('m-id').value = id;
            document.getElementById('m-nome').innerText = nome;
            document.getElementById('m-valor').value = valor > 0 ? valor : "";
            document.getElementById('m-goleiro').checked = goleiro || false;
            document.getElementById('modalPagamento').style.display = 'flex';
        }

        function fecharModal() { document.getElementById('modalPagamento').style.display = 'none'; }

        // Faz o upgrade do jogador para "Confirmado"
        async function confirmarPagamento() {
            const id = document.getElementById('m-id').value;
            const valor = parseFloat(document.getElementById('m-valor').value) || 0;
            const forma = document.getElementById('m-forma').value;
            const goleiro = document.getElementById('m-goleiro').checked;

            await db.collection("jogadores").doc(id).update({
                valorPago: valor,
                formaPgto: forma,
                goleiro: goleiro
            });
            fecharModal();
        }

        // Função para o fim do jogo/início de um novo dia
        async function zerarPagamentosDia() {
            if (!confirm("Isso vai zerar os pagamentos de todos, mas manterá os nomes cadastrados para o próximo jogo. Confirmar?")) return;
            
            const snap = await db.collection("jogadores").get();
            const batch = db.batch();
            snap.forEach(doc => {
                batch.update(doc.ref, { valorPago: 0, formaPgto: "", goleiro: false });
            });
            await batch.commit();
        }

        async function excluirJogador() {
            if (!confirm("Remover permanentemente do banco?")) return;
            const id = document.getElementById('m-id').value;
            await db.collection("jogadores").doc(id).delete();
            fecharModal();
        }
    </script>
</body>
</html>
