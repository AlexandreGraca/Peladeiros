<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Peladeiros - Gestão</title>

    <!-- Firebase & Bibliotecas -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --primary: #2c3e50;
            --accent: #27ae60;
            --danger: #e74c3c;
            --waiting: #3498db;
            --goleiro: #f39c12;
        }

        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        header { text-align: center; margin-bottom: 20px; position: relative; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .logo { max-width: 60px; border-radius: 50%; }

        .search-box { display: flex; gap: 8px; margin-bottom: 20px; }
        .search-box input { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        h3 { font-size: 0.8rem; margin: 15px 0 5px; text-transform: uppercase; color: #7f8c8d; }
        .player-list { list-style: none; padding: 0; }
        
        .player-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px; margin-bottom: 5px; border-radius: 8px; cursor: pointer;
            border: 1px solid #eee; transition: 0.2s;
        }
        .player-item:hover { transform: scale(1.01); }
        .bg-confirmado { background: #e8f5e9; border-left: 5px solid var(--accent); }
        .bg-espera { background: #fff; border-left: 5px solid #bdc3c7; }

        .player-info strong { display: block; color: var(--primary); }
        .player-info span { font-size: 0.7rem; color: #999; }
        .player-total { font-weight: bold; color: var(--accent); margin-right: 10px; }

        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-action { padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
        .btn-whatsapp-send { background: #25d366; grid-column: span 2; }
        .btn-pdf { background: var(--danger); }
        .btn-draw { background: var(--waiting); }
        .btn-clear { background: #95a5a6; grid-column: span 2; margin-top: 5px; }

               /* Modal - Fundo escuro */
.modal { 
    display: none; 
    position: fixed; 
    z-index: 999; 
    left: 0; 
    top: 0; 
    width: 100%; 
    height: 100%; 
    background: rgba(0,0,0,0.8); 
    align-items: center; 
    justify-content: center; 
    overflow-y: auto; /* Permite scroll se a tela for pequena */
}

/* Modal - Cartão Branco */
.modal-content { 
    background: white; 
    padding: 25px; 
    border-radius: 16px; 
    width: 90%; 
    max-width: 400px; 
    margin: auto; /* Garante centralização */
    position: relative;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.auth-input { 
    width: 100%; 
    padding: 12px; 
    margin: 5px 0 15px 0; 
    border: 1px solid #ddd; 
    border-radius: 8px; 
    box-sizing: border-box; /* Importante para o padding não estourar a largura */
}

.modal-row { 
    display: flex; 
    gap: 10px; 
    width: 100%;
}

.modal-row > div { flex: 1; }
    </style>
</head>
<body>

    <div id="auth-container" style="height:100vh; display:flex; align-items:center; justify-content:center; background:#1a1a1a;">
        <div style="background:white; padding:30px; border-radius:12px; text-align:center; width:300px;">
            <img src="https://i.imgur.com/zSl9YOk.jpeg" style="width:60px; border-radius:50%;">
            <h2>Peladeiros</h2>
            <button onclick="loginGoogle()" style="padding:12px; width:100%; cursor:pointer; border-radius: 8px; border: 1px solid #ccc; background: white; font-weight: bold;">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:15px; vertical-align:middle; margin-right:8px;">
                Entrar com Google
            </button>
        </div>
    </div>

    <div id="app-main" class="container" style="display:none;">
        <header>
            <button onclick="logout()" style="position:absolute; right:0; top:0; font-size:0.6rem; background:none; border:none; color:red; cursor:pointer;">Sair</button>
            <img src="https://i.imgur.com/zSl9YOk.jpeg" class="logo">
            <h1 style="font-size: 1.2rem;">⚽ Sorteio ⚽</h1>
            <p id="data-topo" style="font-size:0.8rem; color:#7f8c8d;"></p>
        </header>

        <div class="search-box">
            <input type="text" id="inNome" placeholder="Novo jogador...">
            <button class="btn-add" onclick="cadastrarNovo()">+</button>
        </div>

        <h3 id="tituloConfirmados">Confirmados (0)</h3>
        <ul class="player-list" id="listaConfirmados"></ul>

        <h3 id="tituloEspera">Lista de Espera / Cadastro (0)</h3>
        <ul class="player-list" id="listaEspera"></ul>

        <div class="actions">
            <button class="btn-action btn-draw" onclick="sortear()">Sortear Times</button>
            <button class="btn-action btn-pdf" onclick="gerarPDF()">Relatório PDF</button>
            <button class="btn-action btn-whatsapp-send" onclick="enviarWhatsApp()">Enviar Times (WhatsApp)</button>
            <button class="btn-action btn-clear" onclick="limparPagamentos()">🔄 Zerar Caixa do Dia</button>
        </div>
        <div id="times"></div>
    </div>

   <!-- Modal Pagamento e Dados -->
<div class="modal" id="modalPagamento">
    <div class="modal-content">
        <h3 style="margin-top:0; color:var(--primary);">Dados do Jogador</h3>
        <input type="hidden" id="editId">
        
        <label style="font-size:0.7rem; font-weight:bold;">NOME</label>
        <input type="text" id="m-nome" class="auth-input">

        <div class="modal-row">
            <div>
                <label style="font-size:0.7rem; font-weight:bold;">NASCIMENTO</label>
                <input type="date" id="m-nasc" class="auth-input">
            </div>
            <div>
                <label style="font-size:0.7rem; font-weight:bold;">HABILIDADE</label>
                <select id="m-nivel" class="auth-input">
                    <option value="5">⭐⭐⭐⭐⭐ Craque</option>
                    <option value="4">⭐⭐⭐⭐ Bom</option>
                    <option value="3">⭐⭐⭐ Médio</option>
                    <option value="2">⭐⭐ Esforçado</option>
                    <option value="1">⭐ Perna de Pau</option>
                </select>
            </div>
        </div>

        <div style="background:#f9f9f9; padding:15px; border-radius:12px; border: 1px solid #eee; margin-bottom:15px;">
            <label style="font-size:0.7rem; font-weight:bold;">PAGAMENTO 1</label>
            <div class="modal-row">
                <input type="number" id="m-valor" class="auth-input" placeholder="R$ 0.00">
                <select id="m-forma" class="auth-input">
                    <option value="Pix">Pix</option>
                    <option value="Dinheiro">Dinheiro</option>
                    <option value="Crédito">Crédito</option>
                </select>
            </div>

            <label style="font-size:0.7rem; font-weight:bold;">PAGAMENTO 2 (OPCIONAL)</label>
            <div class="modal-row">
                <input type="number" id="m-valor2" class="auth-input" placeholder="R$ 0.00">
                <select id="m-forma2" class="auth-input">
                    <option value="">-</option>
                    <option value="Pix">Pix</option>
                    <option value="Dinheiro">Dinheiro</option>
                    <option value="Crédito">Crédito</option>
                </select>
            </div>

            <div style="display:flex; align-items:center; gap:10px;">
                <input type="checkbox" id="m-goleiro" style="width:18px; height:18px;">
                <label style="font-size:0.8rem; font-weight:bold;">Goleiro (Fixo)</label>
            </div>
        </div>

        <!-- Botões de Ação - Devem estar aqui dentro -->
        <button class="btn-save" onclick="salvarTudo()">Confirmar e Salvar</button>
        
        <div style="display:flex; justify-content: space-between; margin-top:10px;">
            <button onclick="fecharModal()" style="background:none; border:none; color:#7f8c8d; cursor:pointer; font-size:0.8rem;">Cancelar</button>
            <button onclick="removerDoBanco()" style="background:none; border:none; color:var(--danger); cursor:pointer; font-size:0.7rem; font-weight:bold;">Excluir Jogador</button>
        </div>
    </div>
</div>
                <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                    <input type="checkbox" id="m-goleiro">
                    <label style="font-size:0.8rem;">Goleiro (Fixo)</label>
                </div>
            </div>

            <button class="btn-save" onclick="salvarTudo()" style="margin-top:15px;">Confirmar e Salvar</button>
            <button onclick="fecharModal()" style="width:100%; border:none; background:none; padding:10px; cursor:pointer;">Cancelar</button>
            <button onclick="removerDoBanco()" style="color:red; font-size:0.6rem; border:none; background:none; width:100%; margin-top:10px;">Excluir Jogador do Banco</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC9VtX2SWiCtAPtLx6WGmVwUMA-EX_zuAY",
            authDomain: "dbpeladeiros.firebaseapp.com",
            projectId: "dbpeladeiros",
            storageBucket: "dbpeladeiros.firebasestorage.app",
            messagingSenderId: "460398325975",
            appId: "1:460398325975:web:b382791c2d132d1a3d0092"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let listaJogadores = []; 
        let timesAtuais = [];

        function loginGoogle() { const p = new firebase.auth.GoogleAuthProvider(); firebase.auth().signInWithPopup(p); }
        function logout() { firebase.auth().signOut(); }

        firebase.auth().onAuthStateChanged(u => {
            if (u) {
                document.getElementById('auth-container').style.display = 'none';
                document.getElementById('app-main').style.display = 'block';
                document.getElementById('data-topo').innerText = new Date().toLocaleDateString('pt-BR', {weekday:'long', day:'numeric', month:'long'});
                ouvirBanco();
            } else {
                document.getElementById('auth-container').style.display = 'flex';
                document.getElementById('app-main').style.display = 'none';
            }
        });

        function calcularIdade(dataNasc) {
            if (!dataNasc) return "";
            const hoje = new Date();
            const nasc = new Date(dataNasc);
            let idade = hoje.getFullYear() - nasc.getFullYear();
            if (hoje.getMonth() < nasc.getMonth() || (hoje.getMonth() === nasc.getMonth() && hoje.getDate() < nasc.getDate())) idade--;
            return idade;
        }

        function ouvirBanco() {
            db.collection("jogadores").orderBy("nome").onSnapshot(snap => {
                listaJogadores = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                renderizar();
            });
        }

        async function cadastrarNovo() {
            const n = document.getElementById('inNome').value.trim();
            if (!n) return;
            await db.collection("jogadores").add({
                nome: n, valorPago: 0, forma: "", goleiro: false, nivel: 3, nascimento: ""
            });
            document.getElementById('inNome').value = "";
        }

        function renderizar() {
            const lc = document.getElementById('listaConfirmados');
            const le = document.getElementById('listaEspera');
            lc.innerHTML = ""; le.innerHTML = "";
            let qC = 0; let qE = 0;

            listaJogadores.forEach(j => {
                const idade = calcularIdade(j.nascimento);
                const isConfirmado = (parseFloat(j.valorPago) || 0) >= 15 || j.goleiro === true;
                const classe = isConfirmado ? 'bg-confirmado' : 'bg-espera';
                
                const html = `
                    <li class="player-item ${classe}" onclick="abrirEdicao('${j.id}')">
                        <div class="player-info">
                            <strong>${j.nome} ${idade ? '('+idade+'a)' : ''}</strong>
                            <span>${j.goleiro ? '🧤 Goleiro' : (isConfirmado ? j.forma + ' - ' + j.nivel + '★' : 'Aguardando')}</span>
                        </div>
                        <div class="player-total">${isConfirmado ? 'R$ '+ (parseFloat(j.valorPago) || 0).toFixed(2) : '---'}</div>
                    </li>
                `;

                if (isConfirmado) { lc.innerHTML += html; qC++; }
                else { le.innerHTML += html; qE++; }
            });

            document.getElementById('tituloConfirmados').innerText = `Confirmados (${qC})`;
            document.getElementById('tituloEspera').innerText = `Cadastro / Espera (${qE})`;
        }

        function abrirEdicao(id) {
    const j = listaJogadores.find(x => x.id === id);
    document.getElementById('editId').value = id;
    document.getElementById('m-nome').value = j.nome;
    document.getElementById('m-nasc').value = j.nascimento || "";
    document.getElementById('m-nivel').value = j.nivel || 3;
    
    // Pagamento 1
    document.getElementById('m-valor').value = j.valorPago || "";
    document.getElementById('m-forma').value = j.forma || "Pix";
    
    // Pagamento 2
    document.getElementById('m-valor2').value = j.valorPago2 || "";
    document.getElementById('m-forma2').value = j.forma2 || "";
    
    document.getElementById('m-goleiro').checked = j.goleiro || false;
    document.getElementById('modalPagamento').style.display = 'flex';
}

async function salvarTudo() {
    const id = document.getElementById('editId').value;
    const dados = {
        nome: document.getElementById('m-nome').value,
        nascimento: document.getElementById('m-nasc').value,
        nivel: parseInt(document.getElementById('m-nivel').value),
        valorPago: parseFloat(document.getElementById('m-valor').value) || 0,
        forma: document.getElementById('m-forma').value,
        valorPago2: parseFloat(document.getElementById('m-valor2').value) || 0,
        forma2: document.getElementById('m-forma2').value,
        goleiro: document.getElementById('m-goleiro').checked
    };
    await db.collection("jogadores").doc(id).update(dados);
    fecharModal();
}

        async function limparPagamentos() {
            if (!confirm("Zerar pagamentos do dia? (Nomes e Idades serão mantidos)")) return;
            const batch = db.batch();
            listaJogadores.forEach(j => {
                batch.update(db.collection("jogadores").doc(j.id), { valorPago: 0, forma: "", goleiro: false });
            });
            await batch.commit();
        }

        async function removerDoBanco() {
            if (confirm("Remover este jogador permanentemente?")) {
                await db.collection("jogadores").doc(document.getElementById('editId').value).delete();
                fecharModal();
            }
        }

        function fecharModal() { document.getElementById('modalPagamento').style.display = 'none'; }

        // Lógica de Sorteio Equilibrada
        function sortear() {
            const ativos = listaJogadores.filter(j => (parseFloat(j.valorPago) || 0) >= 15 || j.goleiro === true);
            if (ativos.length < 7) return alert("Mínimo de 7 confirmados para sortear.");

            // Definição de times (média 9 por time)
            let qtdTimes = Math.max(2, Math.floor(ativos.length / 9));
            if (ativos.length > 14 && ativos.length < 18) qtdTimes = 2;

            const goleiros = ativos.filter(j => j.goleiro).sort(() => Math.random() - 0.5);
            const linha = ativos.filter(j => !j.goleiro).sort((a, b) => (b.nivel || 3) - (a.nivel || 3));

            const configCores = [
                { n: "Verde", c: "#27ae60" }, { n: "Amarelo", c: "#f1c40f" },
                { n: "Vermelho", c: "#e74c3c" }, { n: "Roxo", c: "#9b59b6" }
            ];

            timesAtuais = Array.from({ length: qtdTimes }, (_, i) => ({
                nome: configCores[i]?.n || `Time ${i+1}`,
                cor: configCores[i]?.c || "#2c3e50",
                membros: [],
                somaNivel: 0
            }));

            const timeLaranja = { nome: "Laranja (Reserva)", cor: "#e67e22", membros: [], somaNivel: 0 };

            // Distribuir Goleiros
            goleiros.forEach((g, i) => {
                if (i < qtdTimes) timesAtuais[i].membros.push('🧤 ' + g.nome);
                else timeLaranja.membros.push('🧤 ' + g.nome);
            });

            // Snake Draft para Linha
            linha.forEach(j => {
                const timesComVaga = timesAtuais.filter(t => t.membros.length < 9);
                if (timesComVaga.length > 0) {
                    timesComVaga.sort((a, b) => a.somaNivel - b.somaNivel);
                    timesComVaga[0].membros.push('⚽ ' + j.nome);
                    timesComVaga[0].somaNivel += (j.nivel || 3);
                } else {
                    timeLaranja.membros.push(j.nome);
                }
            });

            if (timeLaranja.membros.length > 0) timesAtuais.push(timeLaranja);

            const box = document.getElementById('times');
            box.innerHTML = "<h3 style='margin-top:20px;'>Times Equilibrados</h3>";
            timesAtuais.forEach(t => {
                box.innerHTML += `
                <div style="padding:15px; margin:10px 0; border-radius:8px; background:#fff; border:1px solid #ddd; border-left:10px solid ${t.cor};">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <strong style="color:${t.cor};">${t.nome.toUpperCase()}</strong>
                        <span style="font-size:0.7rem; color:#666;">Força: ${t.somaNivel} | ${t.membros.length} Jogs</span>
                    </div>
                    <div style="margin-top:10px; font-size:0.9rem; line-height:1.6;">${t.membros.join('<br>')}</div>
                </div>`;
            });
        }

        function gerarPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const dataF = new Date().toLocaleDateString('pt-BR');

    doc.setFontSize(16);
    doc.text(`Financeiro Peladeiros - ${dataF}`, 14, 15);

    const pagantes = listaJogadores.filter(j => (parseFloat(j.valorPago) || 0) > 0 || (parseFloat(j.valorPago2) || 0) > 0);
    
    let tPix = 0, tDin = 0, tCre = 0;

    const rows = pagantes.map(j => {
        const v1 = parseFloat(j.valorPago) || 0;
        const v2 = parseFloat(j.valorPago2) || 0;
        const f1 = j.forma || "";
        const f2 = j.forma2 || "";

        // Soma para o resumo
        [ {v: v1, f: f1}, {v: v2, f: f2} ].forEach(p => {
            if (p.f === "Pix") tPix += p.v;
            else if (p.f === "Dinheiro") tDin += p.v;
            else if (p.f === "Crédito") tCre += p.v;
        });

        const infoPagamento = f2 ? `${f1}: R$${v1.toFixed(2)} | ${f2}: R$${v2.toFixed(2)}` : `${f1}: R$${v1.toFixed(2)}`;
        const totalLinha = `R$ ${(v1 + v2).toFixed(2)}`;

        return [j.nome, infoPagamento, totalLinha];
    });

    doc.autoTable({
        startY: 25,
        head: [['Jogador', 'Detalhes (Forma/Valor)', 'Total']],
        body: rows,
        theme: 'striped',
        didDrawCell: (data) => {
            // Se a célula contém a palavra "Crédito", pintamos o texto de vermelho
            if (data.section === 'body' && data.column.index === 1) {
                if (data.cell.raw.includes("Crédito")) {
                    doc.setTextColor(231, 76, 60); // Cor var(--danger)
                } else {
                    doc.setTextColor(44, 62, 80); // Cor normal
                }
            }
        }
    });

    doc.autoTable({
        startY: doc.lastAutoTable.finalY + 10,
        head: [['Resumo Final', 'Total']],
        body: [
            ['PIX', `R$ ${tPix.toFixed(2)}`],
            ['DINHEIRO', `R$ ${tDin.toFixed(2)}`],
            ['CRÉDITO', `R$ ${tCre.toFixed(2)}`],
            ['TOTAL GERAL', `R$ ${(tPix + tDin + tCre).toFixed(2)}`]
        ],
        headStyles: { fillColor: [46, 204, 113] }
    });

    doc.save(`Financeiro_${dataF.replace(/\//g, '-')}.pdf`);
}
        function enviarWhatsApp() {
            if (timesAtuais.length === 0) return alert("Sorteie primeiro!");
            const dataFormatada = new Date().toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: '2-digit' });
            let msg = `*SORTEIO PELADEIROS*\n_${dataFormatada}_\n\n`;
            timesAtuais.forEach(t => {
                msg += `*${t.nome.toUpperCase()}*\n${t.membros.map(m => '• ' + m).join('\n')}\n\n`;
            });
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
