<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Peladeiros - Financeiro Completo</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --primary: #2c3e50; --secondary: #34495e; --accent: #27ae60; --danger: #e74c3c; --waiting: #3498db; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f0f2f5; padding: 15px; }

        .app-container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        header { text-align: center; margin-bottom: 20px; }
        .logo { max-width: 70px; border-radius: 50%; border: 2px solid var(--primary); }
        
        .search-box { display: flex; gap: 8px; margin-bottom: 20px; }
        input[type="text"], input[type="number"] { padding: 12px; border: 2px solid #ddd; border-radius: 8px; outline: none; }
        input[type="text"] { flex: 1; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        h3 { font-size: 0.9rem; margin: 15px 0 5px; text-transform: uppercase; color: #7f8c8d; border-bottom: 1px solid #eee; padding-bottom: 3px; }
        .player-list { list-style: none; margin-bottom: 10px; }
        .player-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f9f9f9; }
        .player-info { cursor: pointer; flex: 1; }
        .player-info strong { display: block; color: var(--primary); }
        .player-info span { font-size: 0.75rem; color: #7f8c8d; }
        
        .nao-pagante strong { color: var(--waiting); }
        .player-total { font-weight: bold; color: var(--accent); margin-right: 10px; }
        .total-zero { color: var(--waiting); }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 400px; }
        .modal-row { margin-bottom: 12px; }
        .modal-row label { display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; }
        .modal-row select, .modal-row input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        .modal-footer { display: flex; gap: 10px; margin-top: 20px; }
        .btn-confirm { background: var(--accent); color: white; border: none; flex: 1; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-cancel { background: #95a5a6; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; }

        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-action { padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 0.85rem; }
        .btn-whatsapp { background: #25d366; grid-column: span 2; }
        .btn-pdf { background: var(--danger); }
        .btn-import { background: var(--secondary); }
        .btn-draw { background: var(--waiting); }
        .btn-clear { background: #95a5a6; }

        .teams-container { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; justify-content: center; }
        .team-card { width: 100%; max-width: 250px; padding: 15px; border-radius: 10px; text-align: center; }
        .team-Verde { background: #d4edda; border-bottom: 4px solid #28a745; }
        .team-Amarelo { background: #fff3cd; border-bottom: 4px solid #ffc107; }
        .team-Vermelho { background: #f8d7da; border-bottom: 4px solid #dc3545; }
        .team-Roxo { background: #e8d7f1; border-bottom: 4px solid #6f42c1; }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <img src="https://i.imgur.com/zSl9YOk.jpeg" class="logo">
            <h1 id="data-topo" style="font-size: 1.2rem; margin-top: 5px;">Peladeiros</h1>
        </header>

        <div class="search-box">
            <input type="text" id="inNome" list="sugestoes" placeholder="Nome do jogador...">
            <datalist id="sugestoes"></datalist>
            <button class="btn-add" onclick="prepararNovo()">+</button>
        </div>

        <h3>Pagantes (Sorteio)</h3>
        <ul class="player-list" id="listaPagantes"></ul>

        <h3>Não Pagantes (Azul)</h3>
        <ul class="player-list" id="listaEspera"></ul>

        <div class="actions">
            <button class="btn-action btn-import" onclick="importarWhatsApp()">Importar WhatsApp</button>
            <button class="btn-action btn-draw" onclick="sortear()">Sortear Somente Pagantes</button>
            <button class="btn-action btn-pdf" onclick="gerarPDF()">Baixar PDF com Totais</button>
            <button class="btn-action btn-clear" onclick="limparTudo()">Limpar Tudo</button>
            <button class="btn-action btn-whatsapp" onclick="enviarWhatsApp()">Enviar WhatsApp</button>
        </div>

        <div id="times" class="teams-container"></div>
    </div>

    <div class="modal" id="modalPagamento">
        <div class="modal-content">
            <h2 id="modalTitulo" style="margin-bottom: 15px;">Pagamento</h2>
            <input type="hidden" id="editId">
            <div class="modal-row">
                <label>Valor 1</label>
                <input type="number" id="val1" placeholder="R$ 0">
                <select id="pag1"><option value="Pix">Pix</option><option value="Dinheiro">Dinheiro</option><option value="Crédito">Crédito</option></select>
            </div>
            <div class="modal-row">
                <label>Valor 2</label>
                <input type="number" id="val2" placeholder="R$ 0">
                <select id="pag2"><option value="-">-</option><option value="Pix">Pix</option><option value="Dinheiro">Dinheiro</option><option value="Crédito">Crédito</option></select>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
                <button class="btn-confirm" onclick="salvarModal()">Confirmar</button>
            </div>
        </div>
    </div>

    <script>
        const JOGADORES_BASE = [
    "Jefinho", "Lacirzinho", "Dudu", "Plínio", "Wagner", 
    "Walace", "Charles", "Kim", "Lacir", "kaio", 
    "Sassá", "Juliano", "Pabim", "Denis", 
    "Jonathan", "Pedro", "Rodriguim", "Tiquinho", "William Carioca", 
    "Piaui", "Lucas", "Adrihan", "Jefinho Bar", "Vitor Pernambuco", "Davi", "Tico", "Robinho", "Pedra Sul", 
    "Gabriel", "Cansado", "Dogba", "Eraldo", "João Barista", "Kelvin", "Dinei", "Piauí", "Vitinho", "China",
    "Léo", "Breninho", "Geovane", "Maycon", "Ladin", "Agnaldo", "Zequinha", "Raimundo", "Thiago"];
        let jogadores = JSON.parse(localStorage.getItem('pelada_data')) || [];
        let modoEdicao = false;
        let timesAtuais = [];

        window.onload = () => {
            document.getElementById('data-topo').innerText = new Date().toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
            const dl = document.getElementById('sugestoes');
            JOGADORES_BASE.sort().forEach(n => dl.innerHTML += `<option value="${n}">`);
            renderizar();
        };

        function prepararNovo() {
            const nome = document.getElementById('inNome').value.trim();
            if (!nome) return;
            modoEdicao = false;
            document.getElementById('editId').value = "";
            document.getElementById('modalTitulo').innerText = `Pagamento: ${nome}`;
            document.getElementById('val1').value = "";
            document.getElementById('val2').value = "";
            document.getElementById('modalPagamento').style.display = 'flex';
        }

        function editarJogador(id) {
            const j = jogadores.find(item => item.id === id);
            if (!j) return;
            modoEdicao = true;
            document.getElementById('editId').value = id;
            document.getElementById('inNome').value = j.nome;
            document.getElementById('modalTitulo').innerText = `Editar: ${j.nome}`;
            document.getElementById('val1').value = j.v1 || "";
            document.getElementById('pag1').value = j.p1;
            document.getElementById('val2').value = j.v2 || "";
            document.getElementById('pag2').value = j.p2;
            document.getElementById('modalPagamento').style.display = 'flex';
        }

        function fecharModal() {
            document.getElementById('modalPagamento').style.display = 'none';
            document.getElementById('inNome').value = "";
        }

        function salvarModal() {
            const nomeInput = document.getElementById('inNome').value.trim();
            const v1 = parseFloat(document.getElementById('val1').value) || 0;
            const p1 = document.getElementById('pag1').value;
            const v2 = parseFloat(document.getElementById('val2').value) || 0;
            const p2 = document.getElementById('pag2').value;
            const idEdicao = document.getElementById('editId').value;

            let jogadorAfetado;

            if (modoEdicao) {
                const idx = jogadores.findIndex(j => j.id == idEdicao);
                jogadores[idx] = { ...jogadores[idx], v1, p1, v2, p2 };
                jogadorAfetado = jogadores[idx];
            } else {
                if (jogadores.some(j => j.nome.toLowerCase() === nomeInput.toLowerCase())) return alert("Já está na lista!");
                jogadorAfetado = { id: Date.now(), nome: nomeInput, v1, p1, v2, p2 };
                jogadores.push(jogadorAfetado);
            }
            
            if ((v1 + v2) > 0 && timesAtuais.length > 0) {
                const jaEstaEmTime = timesAtuais.some(t => t.membros.includes(jogadorAfetado.nome));
                if (!jaEstaEmTime) incluirEmTimeExistente(jogadorAfetado.nome);
            }

            localStorage.setItem('pelada_data', JSON.stringify(jogadores));
            renderizar();
            fecharModal();
        }

        function renderizar() {
            const listaP = document.getElementById('listaPagantes');
            const listaE = document.getElementById('listaEspera');
            listaP.innerHTML = ""; listaE.innerHTML = "";

            jogadores.forEach(j => {
                const total = j.v1 + j.v2;
                let detalhe = "";
                if (j.v1 > 0) detalhe += `${j.p1}: R$${j.v1}`;
                if (j.v2 > 0) detalhe += `${detalhe ? ' | ' : ''}${j.p2}: R$${j.v2}`;

                const html = `
                    <li class="player-item ${total === 0 ? 'nao-pagante' : ''}">
                        <div class="player-info" onclick="editarJogador(${j.id})">
                            <strong>${j.nome} ✏️</strong>
                            <span>${detalhe || 'Aguardando pagamento'}</span>
                        </div>
                        <div style="display:flex; align-items:center;">
                            <span class="player-total ${total === 0 ? 'total-zero' : ''}">R$ ${total.toFixed(2)}</span>
                            <button onclick="remover(${j.id})" style="border:none; background:none; color:red; cursor:pointer;">✕</button>
                        </div>
                    </li>`;
                
                if (total > 0) listaP.innerHTML += html;
                else listaE.innerHTML += html;
            });
            renderizarTimes();
        }

        function incluirEmTimeExistente(nome) {
            timesAtuais.sort((a, b) => a.membros.length - b.membros.length);
            timesAtuais[0].membros.push(nome);
        }

        function sortear() {
            const pagantes = jogadores.filter(j => (j.v1 + j.v2) > 0);
            if (pagantes.length < 2) return alert("Adicione pelo menos 2 pagantes!");
            
            const misturado = [...pagantes].sort(() => Math.random() - 0.5);
            const qtdTimes = Math.ceil(misturado.length / 8);
            timesAtuais = Array.from({length: qtdTimes}, (_, i) => ({ 
                nome: ["Verde", "Amarelo", "Vermelho", "Roxo"][i] || `Time ${i+1}`, 
                membros: [] 
            }));
            
            misturado.forEach((j, i) => timesAtuais[i % qtdTimes].membros.push(j.nome));
            renderizarTimes();
        }

        function renderizarTimes() {
            const box = document.getElementById('times');
            box.innerHTML = "";
            timesAtuais.forEach(t => {
                box.innerHTML += `
                    <div class="team-card team-${t.nome}">
                        <h3>${t.nome} (${t.membros.length})</h3>
                        <p style="font-weight:bold;">${t.membros.join('<br>')}</p>
                    </div>`;
            });
        }

        function remover(id) {
            if(confirm("Remover?")) {
                const j = jogadores.find(i => i.id === id);
                if(j) timesAtuais.forEach(t => t.membros = t.membros.filter(m => m !== j.nome));
                jogadores = jogadores.filter(j => j.id !== id);
                localStorage.setItem('pelada_data', JSON.stringify(jogadores));
                renderizar();
            }
        }

        function limparTudo() {
            if(confirm("Zerar tudo?")) {
                jogadores = []; timesAtuais = [];
                localStorage.setItem('pelada_data', JSON.stringify(jogadores));
                renderizar();
            }
        }

        function importarWhatsApp() {
            const txt = prompt("Cole a lista:");
            if (!txt) return;
            txt.split('\n').forEach(l => {
                let n = l.replace(/^[\d\.\s*-]+/, '').trim();
                if (n.length > 2 && !n.toLowerCase().includes("pelada") && !jogadores.some(j => j.nome.toLowerCase() === n.toLowerCase())) {
                    jogadores.push({ id: Date.now() + Math.random(), nome: n, v1: 0, p1: "Pix", v2: 0, p2: "-" });
                }
            });
            localStorage.setItem('pelada_data', JSON.stringify(jogadores));
            renderizar();
        }

        function gerarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("Fechamento Peladeiros", 14, 15);
            
            let totalPix = 0;
            let totalDinheiro = 0;
            let totalCredito = 0;
            
            const body = jogadores.map(j => {
                const total = j.v1 + j.v2;
                
                // Soma por categoria
                if (j.p1 === "Pix") totalPix += j.v1;
                if (j.p1 === "Dinheiro") totalDinheiro += j.v1;
                if (j.p1 === "Crédito") totalCredito += j.v1;
                
                if (j.p2 === "Pix") totalPix += j.v2;
                if (j.p2 === "Dinheiro") totalDinheiro += j.v2;
                if (j.p2 === "Crédito") totalCredito += j.v2;

                return [j.nome, `${j.p1}: R$${j.v1}`, `${j.p2}: R$${j.v2}`, `R$ ${total.toFixed(2)}` ];
            });

            const totalGeral = totalPix + totalDinheiro + totalCredito;

            doc.autoTable({ 
                startY: 25, 
                head: [['Jogador', 'Pag 1', 'Pag 2', 'Total']], 
                body: body,
                theme: 'striped'
            });

            const finalY = doc.lastAutoTable.finalY + 10;
            
            // Tabela de resumo financeiro
            doc.autoTable({
                startY: finalY,
                head: [['Resumo por Categoria', 'Valor Total']],
                body: [
                    ['Total em PIX', `R$ ${totalPix.toFixed(2)}`],
                    ['Total em DINHEIRO', `R$ ${totalDinheiro.toFixed(2)}`],
                    ['Total em CRÉDITO', `R$ ${totalCredito.toFixed(2)}`],
                    [{content: 'TOTAL GERAL ARRECADADO', styles: {fillColor: [39, 174, 96], textColor: [255,255,255], fontStyle: 'bold'}}, 
                     {content: `R$ ${totalGeral.toFixed(2)}`, styles: {fillColor: [39, 174, 96], textColor: [255,255,255], fontStyle: 'bold'}}]
                ],
                theme: 'grid',
                styles: { fontSize: 11 }
            });

            doc.save(`fechamento_pelada_${new Date().toLocaleDateString('pt-BR')}.pdf`);
        }

        function enviarWhatsApp() {
            let msg = `⚽ *Sorteio Peladeiros* ⚽\n\n`;
            if (timesAtuais.length === 0) return alert("Sorteie primeiro!");
            timesAtuais.forEach(t => {
                msg += `*${t.nome}* (${t.membros.length})\n${t.membros.join('\n')}\n\n`;
            });
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
