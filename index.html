<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Peladeiros</title>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #27ae60;
            --danger: #e74c3c;
            --waiting: #3498db;
            --goleiro: #f39c12;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: #f0f2f5;
        }

        #auth-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
        }

        .login-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 350px;
            text-align: center;
        }

        .auth-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .btn-auth {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        #app-main {
            display: none;
            max-width: 600px;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }

        .btn-logout {
            position: absolute;
            right: 0;
            top: 0;
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 0.7rem;
        }

        .logo {
            max-width: 60px;
            border-radius: 50%;
        }

        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .search-box input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
        }

        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        h3 {
            font-size: 0.8rem;
            margin: 15px 0 5px;
            text-transform: uppercase;
            color: #7f8c8d;
        }

        .player-list {
            list-style: none;
        }

        .player-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f9f9f9;
        }

        .player-info {
            cursor: pointer;
            flex: 1;
        }

        .player-info strong {
            display: block;
            color: var(--primary);
        }

        .player-info span {
            font-size: 0.7rem;
            color: #999;
        }

        .player-total {
            font-weight: bold;
            color: var(--accent);
            margin-right: 10px;
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-action {
            padding: 12px;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .btn-whatsapp-send {
            background: #25d366;
            grid-column: span 2;
        }

        .btn-pdf {
            background: var(--danger);
        }

        .btn-import {
            background: var(--secondary);
        }

        .btn-draw {
            background: var(--waiting);
        }

        .btn-clear {
            background: #95a5a6;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-row {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }

        .modal-row input {
            flex: 1;
        }

        .modal-row select {
            flex: 1;
            border-radius: 8px;
            border: 1px solid #ddd;
            padding: 10px;
        }

        .bg-confirmado {
            background-color: #e8f5e9 !important;
            border-left: 5px solid #27ae60;
            margin-bottom: 5px;
            padding-left: 10px !important;
            border-radius: 8px;
        }

        .bg-espera {
            background-color: #ffebee !important;
            border-left: 5px solid #e74c3c;
            margin-bottom: 5px;
            padding-left: 10px !important;
            border-radius: 8px;
        }
    </style>
</head>

<body>

    <div id="auth-container">
        <div class="login-card">
            <img src="https://i.imgur.com/zSl9YOk.jpeg" class="logo">
            <h2>Sorteio Peladeiros</h2>
            <h4>⚽ Desde 1982 🍻🍖</h4>
            <h6>Futebol & Resenha</h6>
            <h3>Login</h3>
            <p style="margin-bottom: 20px; color: #666;">Acesso Restrito</p>

            <button class="btn-auth" onclick="loginGoogle()"
                style="display: flex; align-items: center; justify-content: center; gap: 10px; background: white; color: #444; border: 1px solid #ddd;">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
                Entrar com Google
            </button>

            <p id="error-login" style="color:red; font-size:0.8rem; margin-top:10px; display:none;"></p>
        </div>
    </div>

    <div id="app-main">
        <header>
            <button class="btn-logout" onclick="logout()">Sair</button>
            <img src="https://i.imgur.com/zSl9YOk.jpeg" class="logo">
            <h1 style="font-size: 1.3rem; margin-bottom: 2px;">⚽ Sorteio ⚽</h1>
            <p id="data-topo" style="font-size: 0.85rem; color: #7f8c8d; font-weight: bold;"></p>
        </header>

        <div class="search-box">
            <input type="text" id="inNome" placeholder="Novo jogador...">
            <button class="btn-add" onclick="abrirNovo()">+</button>
        </div>

        <h3 id="tituloConfirmados">Confirmados (0)</h3>
        <ul class="player-list" id="listaPagantes"></ul>

        <h3 id="tituloEspera">Lista de Espera (0)</h3>
        <ul class="player-list" id="listaEspera"></ul>

        <div class="actions">
            <button class="btn-action btn-import" onclick="importarWhatsApp()">Importar WhatsApp</button>
            <button class="btn-action btn-draw" onclick="sortear()">Sortear Times</button>
            <button class="btn-action btn-pdf" onclick="gerarPDF()">Relatório PDF</button>
            <button class="btn-action btn-clear" onclick="limparTudo()">Zerar Lista</button>
            <button class="btn-action btn-whatsapp-send" onclick="enviarWhatsApp()">Enviar WhatsApp</button>
        </div>
        <div id="times"></div>
    </div>

    <!-- MODAL ÚNICO DE CADASTRO E PAGAMENTO -->
    <div class="modal" id="modalPagamento">
        <div class="modal-content">
            <h2 id="modalTitulo">Dados do Jogador</h2>
            <input type="hidden" id="editId">

            <div style="margin-top: 10px;">
                <label style="font-size: 0.7rem; font-weight: bold;">NOME / APELIDO</label>
                <input type="text" id="modalNomeInput" class="auth-input" placeholder="Ex: Jefinho">
            </div>

            <div class="modal-row">
                <div style="flex:1">
                    <label style="font-size: 0.7rem; font-weight: bold;">NASCIMENTO</label>
                    <input type="date" id="dataNascimento" class="auth-input">
                </div>
                <div style="flex:1">
                    <label style="font-size: 0.7rem; font-weight: bold;">HABILIDADE</label>
                    <select id="nivelTecnico" class="auth-input">
                        <option value="5">⭐⭐⭐⭐⭐ (Craque)</option>
                        <option value="4">⭐⭐⭐⭐ (Bom)</option>
                        <option value="3" selected>⭐⭐⭐ (Médio)</option>
                        <option value="2">⭐⭐ (Esforçado)</option>
                        <option value="1">⭐ (Perna de Pau)</option>
                    </select>
                </div>
            </div>

            <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">

            <div style="text-align: center; margin: 10px 0;">
                <p style="font-size: 0.7rem; font-weight: bold; color: var(--primary); margin-bottom: 5px;">QRCODE (PIX)
                </p>
                <img src="https://i.imgur.com/5Dz3zDQ.jpeg" alt="QR Code Pix"
                    style="width: 120px; height: 120px; border: 1px solid #ddd; border-radius: 8px; padding: 5px;">
            </div>

            <label style="font-size: 0.7rem; font-weight: bold;">PAGAMENTO 1</label>
            <div class="modal-row">
                <input type="number" id="val1" class="auth-input" placeholder="Valor">
                <select id="pag1">
                    <option value="Pix"> ❖ PIX</option>
                    <option value="Dinheiro">💲 Dinheiro</option>
                    <option value="Crédito">💳 Crédito</option>
                </select>
            </div>

            <label style="font-size: 0.7rem; font-weight: bold;">PAGAMENTO 2 (OPCIONAL)</label>
            <div class="modal-row">
                <input type="number" id="val2" class="auth-input" placeholder="Valor">
                <select id="pag2">
                    <option value="-">-</option>
                    <option value="Pix"> ❖ PIX</option>
                    <option value="Dinheiro">💲 Dinheiro</option>
                    <option value="Crédito">💳 Crédito</option>
                </select>
            </div>

            <button
                style="width:100%; padding:10px; background:var(--goleiro); color:white; border:none; border-radius:8px; margin-bottom:10px; font-weight:bold; cursor:pointer;"
                onclick="salvarGoleiro()">🧤 MARCAR COMO GOLEIRO</button>

            <div style="display:flex; gap:10px;">
                <button style="flex:1; padding:10px; background:#ccc; border:none; border-radius:8px; cursor:pointer;"
                    onclick="fecharModal()">Cancelar</button>
                <button
                    style="flex:1; padding:10px; background:var(--accent); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;"
                    onclick="salvarPagamento()">Confirmar</button>
            </div>
        </div>
    </div>

    <script>
        const EMAILS_PERMITIDOS = ["alexandre.gcomp@gmail.com", "jeffinho648@gmail.com", "lacirsmattos@gmail.com"];
        const firebaseConfig = {
            apiKey: "AIzaSyC9VtX2SWiCtAPtLx6WGmVwUMA-EX_zuAY",
            authDomain: "dbpeladeiros.firebaseapp.com",
            projectId: "dbpeladeiros",
            storageBucket: "dbpeladeiros.firebasestorage.app",
            messagingSenderId: "460398325975",
            appId: "1:460398325975:web:b382791c2d132d1a3d0092",
            measurementId: "G-ZKSZBZWERE"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        let jogadores = []; let timesAtuais = [];

        async function loginGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                const result = await auth.signInWithPopup(provider);
                const user = result.user;
                if (!EMAILS_PERMITIDOS.includes(user.email.toLowerCase())) {
                    alert("Acesso Negado.");
                    await auth.signOut();
                    return;
                }
            } catch (error) {
                alert("Falha na autenticação.");
            }
        }

        auth.onAuthStateChanged(u => {
            if (u && EMAILS_PERMITIDOS.includes(u.email.toLowerCase())) {
                document.getElementById('auth-container').style.display = 'none';
                document.getElementById('app-main').style.display = 'block';
                carregar();
            } else {
                document.getElementById('auth-container').style.display = 'flex';
                document.getElementById('app-main').style.display = 'none';
            }
        });

        function logout() { auth.signOut(); }

        function carregar() {
            const elementoData = document.getElementById('data-topo');
            if (elementoData) {
                const dataHoje = new Date();
                const opcoes = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
                elementoData.innerText = dataHoje.toLocaleDateString('pt-BR', opcoes);
            }
            db.collection("jogadores").orderBy("nome").onSnapshot(snap => {
                jogadores = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderizar();
            });
        }

        // Função para calcular idade
        function calcularIdade(dataNasc) {
            if (!dataNasc) return 0;
            const hoje = new Date();
            const nasc = new Date(dataNasc);
            let idade = hoje.getFullYear() - nasc.getFullYear();
            const m = hoje.getMonth() - nasc.getMonth();
            if (m < 0 || (m === 0 && hoje.getDate() < nasc.getDate())) idade--;
            return idade;
        }

        function abrirNovo() {
            const n = document.getElementById('inNome').value.trim();
            if (!n) return;

            document.getElementById('editId').value = "";
            document.getElementById('modalNomeInput').value = n;
            document.getElementById('val1').value = "";
            document.getElementById('val2').value = "";
            document.getElementById('dataNascimento').value = "";
            document.getElementById('nivelTecnico').value = "3";
            document.getElementById('modalPagamento').style.display = 'flex';
        }

        async function salvarPagamento() {
            const id = document.getElementById('editId').value;
            const nome = document.getElementById('modalNomeInput').value.trim();
            const dataNasc = document.getElementById('dataNascimento').value;
            const nivel = parseInt(document.getElementById('nivelTecnico').value) || 3;

            const v1 = parseFloat(document.getElementById('val1').value) || 0;
            const p1 = document.getElementById('pag1').value;
            const v2 = parseFloat(document.getElementById('val2').value) || 0;
            const p2 = document.getElementById('pag2').value;

            if (!nome) return alert("Insira o nome do jogador.");

            const dados = {
                nome: nome,
                dataNascimento: dataNasc,
                idade: calcularIdade(dataNasc),
                nivel: nivel,
                v1: v1, p1: p1,
                v2: v2, p2: p2,
                isGoleiro: false
            };

            if (id) await db.collection("jogadores").doc(id).update(dados);
            else await db.collection("jogadores").add(dados);

            fecharModal();
        }

        async function salvarGoleiro() {
            const id = document.getElementById('editId').value;
            const nome = document.getElementById('modalNomeInput').value.trim();
            const dataNasc = document.getElementById('dataNascimento').value;
            const nivel = parseInt(document.getElementById('nivelTecnico').value) || 3;

            if (!nome) return alert("Insira o nome do jogador.");

            const dados = {
                nome: nome,
                dataNascimento: dataNasc,
                idade: calcularIdade(dataNasc),
                nivel: nivel,
                v1: 0, p1: "Pix", v2: 0, p2: "-",
                isGoleiro: true
            };

            if (id) await db.collection("jogadores").doc(id).update(dados);
            else await db.collection("jogadores").add(dados);
            fecharModal();
        }

        function renderizar() {
            const lp = document.getElementById('listaPagantes');
            const le = document.getElementById('listaEspera');
            lp.innerHTML = ""; le.innerHTML = "";
            let qtdC = 0; let qtdE = 0;

            jogadores.forEach(j => {
                const total = (j.v1 || 0) + (j.v2 || 0);
                const ok = total >= 15 || j.isGoleiro;
                const classe = ok ? 'bg-confirmado' : 'bg-espera';

                // Recalcula idade caso tenha mudado o dia
                const idadeExibida = j.dataNascimento ? calcularIdade(j.dataNascimento) : (j.idade || "");

                let desc = j.isGoleiro ? "🧤 GOLEIRO" : `${j.p1}: R$${j.v1}`;
                if (!j.isGoleiro && j.v2 > 0) desc += ` | ${j.p2}: R$${j.v2}`;
                desc += ` | Nível: ${j.nivel || 3}★`;

                const html = `<li class="player-item ${classe}">
                    <div class="player-info" onclick="abrirEdicao('${j.id}')">
                        <strong>${j.nome} ${idadeExibida ? '(' + idadeExibida + 'a)' : ''}</strong>
                        <span>${desc}</span>
                    </div>
                    <div style="display:flex; align-items:center;">
                        <span class="player-total">${j.isGoleiro ? 'OK' : 'R$' + total}</span>
                        <button onclick="remover('${j.id}')" style="border:none; background:none; color:red; cursor:pointer; padding: 10px;">✕</button>
                    </div>
                </li>`;

                if (ok) { lp.innerHTML += html; qtdC++; }
                else { le.innerHTML += html; qtdE++; }
            });

            document.getElementById('tituloConfirmados').innerText = `Confirmados (${qtdC})`;
            document.getElementById('tituloEspera').innerText = `Lista de Espera (${qtdE})`;
        }

        function abrirEdicao(id) {
            const j = jogadores.find(x => x.id === id);
            document.getElementById('editId').value = id;
            document.getElementById('modalNomeInput').value = j.nome;
            document.getElementById('dataNascimento').value = j.dataNascimento || "";
            document.getElementById('nivelTecnico').value = j.nivel || 3;
            document.getElementById('val1').value = j.v1 || "";
            document.getElementById('val2').value = j.v2 || "";
            document.getElementById('modalPagamento').style.display = 'flex';
        }

        function fecharModal() {
            document.getElementById('modalPagamento').style.display = 'none';
            document.getElementById('inNome').value = "";
        }

        async function remover(id) { if (confirm("Remover?")) await db.collection("jogadores").doc(id).delete(); }

        async function limparTudo() {
            if (confirm("Zerar lista?")) {
                const snap = await db.collection("jogadores").get();
                const b = db.batch(); snap.forEach(d => b.delete(d.ref)); await b.commit();
                document.getElementById('times').innerHTML = "";
            }
        }

        // --- Mantenha suas funções de Sorteio, PDF e WhatsApp como estavam ---
        // (Apenas certifique-se que o sorteio use 'j.nivel' para o equilíbrio)

        function sortear() {
            const ativos = jogadores.filter(j => ((parseFloat(j.v1) || 0) + (parseFloat(j.v2) || 0)) >= 15 || j.isGoleiro);
            const totalJogadores = ativos.length;
            if (totalJogadores < 7) return alert("Mínimo de 7 jogadores.");

            let qtdTimes = Math.max(1, Math.floor(totalJogadores / 9));
            const goleiros = ativos.filter(j => j.isGoleiro).sort(() => Math.random() - 0.5);
            const linha = ativos.filter(j => !j.isGoleiro).sort((a, b) => (parseInt(b.nivel) || 3) - (parseInt(a.nivel) || 3));

            const configCores = [{ n: "Verde", c: "#27ae60" }, { n: "Amarelo", c: "#f1c40f" }, { n: "Vermelho", c: "#e74c3c" }, { n: "Roxo", c: "#9b59b6" }];
            timesAtuais = Array.from({ length: qtdTimes }, (_, i) => ({
                nome: configCores[i]?.n || `Time ${i + 1}`,
                cor: configCores[i]?.c || "#2c3e50",
                membros: [], somaNivel: 0
            }));

            const reserva = { nome: "Laranja (Reserva)", cor: "#e67e22", membros: [], somaNivel: 0 };

            goleiros.forEach((g, i) => {
                if (i < qtdTimes) timesAtuais[i].membros.push('🧤 ' + g.nome);
                else reserva.membros.push('🧤 ' + g.nome);
            });

            linha.forEach(j => {
                const timesComVaga = timesAtuais.filter(t => t.membros.length < 9);
                if (timesComVaga.length > 0) {
                    timesComVaga.sort((a, b) => a.somaNivel - b.somaNivel);
                    timesComVaga[0].membros.push('⚽ ' + j.nome);
                    timesComVaga[0].somaNivel += (parseInt(j.nivel) || 3);
                } else {
                    reserva.membros.push(j.nome);
                }
            });

            if (reserva.membros.length > 0) timesAtuais.push(reserva);

            const box = document.getElementById('times');
            box.innerHTML = "<h3 style='margin-top:20px;'>Times Equilibrados</h3>";
            timesAtuais.forEach(t => {
                box.innerHTML += `
                    <div style="padding:15px; margin:10px 0; border-radius:8px; background:#fff; border:1px solid #ddd; border-left:10px solid ${t.cor};">
                        <strong style="color:${t.cor};">${t.nome.toUpperCase()}</strong>
                        <div style="margin-top:10px; font-size:0.9rem;">${t.membros.join('<br>')}</div>
                    </div>`;
            });
        }

        function gerarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const dataF = new Date().toLocaleDateString('pt-BR').replaceAll('/', '-');
            doc.text(`Financeiro Peladeiros - ${dataF}`, 14, 15);
            const confirmados = jogadores.filter(j => ((parseFloat(j.v1) || 0) + (parseFloat(j.v2) || 0)) >= 15 || j.isGoleiro);
            const rows = confirmados.map(j => [j.nome, `R$ ${(parseFloat(j.v1) || 0) + (parseFloat(j.v2) || 0)}`, j.isGoleiro ? "SIM" : "NÃO"]);
            doc.autoTable({ startY: 25, head: [['Nome', 'Total Pago', 'Goleiro']], body: rows });
            doc.save(`Financeiro_${dataF}.pdf`);
        }

        function enviarWhatsApp() {
            if (timesAtuais.length === 0) return alert("Sorteie primeiro!");
            let msg = `*SORTEIO PELADEIROS*\n\n`;
            timesAtuais.forEach(t => {
                msg += `*${t.nome.toUpperCase()}*\n${t.membros.map(m => '• ' + m).join('\n')}\n\n`;
            });
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
        }

        async function importarWhatsApp() {
            const txt = prompt("Cole a lista do WhatsApp:");
            if (!txt) return;
            const linhas = txt.split('\n');
            const batch = db.batch();
            const nomesExistentes = new Set(jogadores.map(j => j.nome.toLowerCase().trim()));
            linhas.forEach(l => {
                let n = l.replace(/^[\d\.\s*-]+/, '').trim();
                if (n.length > 2 && !nomesExistentes.has(n.toLowerCase())) {
                    const novoRef = db.collection("jogadores").doc();
                    batch.set(novoRef, { nome: n, v1: 0, p1: "Pix", v2: 0, p2: "-", isGoleiro: false, nivel: 3 });
                }
            });
            await batch.commit();
        }
    </script>
