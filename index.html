<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestão Peladeiros - 2026</title>

    <!-- Firebase & Bibliotecas -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --primary: #2c3e50;
            --accent: #27ae60;
            --danger: #e74c3c;
            --waiting: #3498db;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 10px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            position: relative;
        }

        .logo {
            max-width: 60px;
            border-radius: 50%;
        }

        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .search-box input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
        }

        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .player-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid #eee;
            transition: 0.2s;
        }

        .bg-confirmado {
            background: #e8f5e9;
            border-left: 5px solid var(--accent);
        }

        .bg-espera {
            background: #fff;
            border-left: 5px solid #bdc3c7;
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-action {
            padding: 12px;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .btn-whatsapp-send {
            background: #25d366;
            grid-column: span 2;
        }

        .btn-pdf {
            background: var(--danger);
        }

        .btn-draw {
            background: var(--waiting);
        }

        .btn-clear {
            background: #95a5a6;
            grid-column: span 2;
            margin-top: 5px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .auth-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .card-time {
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            background: #fff;
            border: 1px solid #ddd;
        }

        .badge-info {
            font-size: 0.7rem;
            background: #eee;
            padding: 3px 8px;
            border-radius: 10px;
            color: #555;
            font-weight: bold;
            margin-right: 4px;
        }
    </style>
</head>

<body>

    <div id="auth-container"
    style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#1a1a1a; gap:20px;">
    
    <!-- Logo acima do botão -->
    <img src="https://i.imgur.com/5Dz3zDQ.jpeg" 
         alt="Logo Peladeiros" 
         style="max-width: 150px; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">

    <button onclick="loginGoogle()"
        style="padding:15px 30px; border-radius:8px; font-weight:bold; cursor:pointer; background: white; border: none; font-size: 1rem;">
        Entrar com Google
    </button>
</div>

    <div id="app-main" class="container" style="display:none;">
        <header>
    <img src="https://i.imgur.com/zSl9YOk.jpeg" class="logo">
    <h1 style="font-size: 1.2rem; margin: 5px 0 0 0;">⚽ Sorteio ⚽</h1>
    <!-- Elemento onde a data será exibida -->
    <div id="data-atual" style="font-size: 0.8rem; color: #666; margin-bottom: 10px; font-weight: bold;"></div>
    
    <button onclick="logout()"
        style="position:absolute; right:0; top:0; background:none; border:none; color:red; cursor:pointer; font-size:0.7rem;">Sair</button>
</header>

        <div class="search-box">
            <input type="text" id="inNome" placeholder="Nome do novo jogador...">
            <button class="btn-add" onclick="cadastrarNovo()">+</button>
        </div>

        <h3 id="tituloConfirmados">Confirmados (0)</h3>
        <ul id="listaConfirmados" style="list-style:none; padding:0;"></ul>

        <h3 id="tituloEspera">Lista de Espera / Cadastro (0)</h3>
        <ul id="listaEspera" style="list-style:none; padding:0;"></ul>

        <div class="actions">
            <button class="btn-action btn-draw" onclick="sortear()">🤞 Sortear Times</button>
            <button class="btn-action btn-pdf" onclick="gerarPDF()">📄 Relatório PDF</button>
            <button class="btn-action btn-whatsapp-send" onclick="enviarWhatsApp()">📄 Enviar Times WhatsApp</button>
            <button class="btn-action btn-clear" onclick="limparPagamentos()">🔄 Zerar Caixa do Dia</button>
        </div>
        <div id="times"></div>
    </div>

    <!-- Modal Edição -->
    <div class="modal" id="modalPagamento">
        <div class="modal-content">
            <h3 style="margin:0">Dados do Jogador</h3>
            <input type="hidden" id="editId">
            <input type="text" id="m-nome" class="auth-input" placeholder="Nome">
            <input type="date" id="m-nasc" class="auth-input">

            <select id="m-nivel" class="auth-input">
                <option value="5">⭐⭐⭐⭐⭐ (Craque)</option>
                <option value="4">⭐⭐⭐⭐ (Bom)</option>
                <option value="3" selected>⭐⭐⭐ (Médio)</option>
                <option value="2">⭐⭐ (Esforçado)</option>
                <option value="1">⭐ (Perna de Pau)</option>
            </select>

            <div style="background:#f9f9f9; padding:10px; border-radius:10px; border:1px solid #eee;">
                <label style="font-size:0.7rem; font-weight:bold;">Pagamento 1</label>
                <div style="display:flex; gap:5px; margin-bottom:10px;">
                    <input type="number" id="m-valor" class="auth-input" placeholder="0.00">
                    <select id="m-forma" class="auth-input">
                        <option value="Pix">❖Pix</option>
                        <option value="Dinheiro">💲Dinheiro</option>
                        <option value="Crédito">💳Crédito</option>
                    </select>
                </div>
                <label style="font-size:0.7rem; font-weight:bold;">Pagamento 2</label>
                <div style="display:flex; gap:5px;">
                    <input type="number" id="m-valor2" class="auth-input" placeholder="0.00">
                    <select id="m-forma2" class="auth-input">
                        <option value="">-</option>
                        <option value="Pix">❖Pix</option>
                        <option value="Dinheiro">💲Dinheiro</option>
                        <option value="Crédito">💳Crédito</option>
                    </select>
                </div>
                <div style="margin-top:10px;">
                    <input type="checkbox" id="m-goleiro"> Goleiro Fixo
                </div>
            </div>

            <button onclick="salvarTudo()"
                style="background:var(--accent); color:white; border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer;">SALVAR
                ALTERAÇÕES</button>
            <button id="btn-excluir-dinamico" onclick="acaoExcluirDinamica()" 
    style="background:var(--danger); color:white; border:none; padding:10px; border-radius:8px; font-weight:bold; cursor:pointer;">
    🗑️ EXCLUIR
</button>
            <button onclick="fecharModal()"
                style="background:none; border:none; color:gray; cursor:pointer;">Cancelar</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyC9VtX2SWiCtAPtLx6WGmVwUMA-EX_zuAY", authDomain: "dbpeladeiros.firebaseapp.com", projectId: "dbpeladeiros", storageBucket: "dbpeladeiros.firebasestorage.app", messagingSenderId: "460398325975", appId: "1:460398325975:web:b382791c2d132d1a3d0092" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let listaJogadores = []; let timesAtuais = [];

        function loginGoogle() { firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function logout() { firebase.auth().signOut(); window.location.reload(); }

        firebase.auth().onAuthStateChanged(u => {
            if (u) { document.getElementById('auth-container').style.display = 'none'; document.getElementById('app-main').style.display = 'block'; ouvirBanco(); }
        });

        function ouvirBanco() {
            db.collection("jogadores").orderBy("nome").onSnapshot(snap => {
                listaJogadores = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderizar();
            });
        }

        async function cadastrarNovo() {
            const n = document.getElementById('inNome').value.trim();
            if (!n) return;
            if (listaJogadores.some(j => j.nome.toLowerCase() === n.toLowerCase())) {
                alert("Erro: Este jogador já está cadastrado!"); return;
            }
            await db.collection("jogadores").add({ nome: n, valorPago: 0, forma: "", valorPago2: 0, forma2: "", goleiro: false, nivel: 3, nascimento: "" });
            document.getElementById('inNome').value = "";
        }

        function calcularIdade(data) {
            if (!data) return null;
            const nasc = new Date(data); const hoje = new Date();
            let idade = hoje.getFullYear() - nasc.getFullYear();
            if (hoje.getMonth() < nasc.getMonth() || (hoje.getMonth() === nasc.getMonth() && hoje.getDate() < nasc.getDate())) idade--;
            return idade;
        }

        function renderizar() {
            const lc = document.getElementById('listaConfirmados');
            const le = document.getElementById('listaEspera');
            lc.innerHTML = ""; le.innerHTML = "";
            let c = 0, e = 0;

            listaJogadores.forEach(j => {
                const total = (parseFloat(j.valorPago) || 0) + (parseFloat(j.valorPago2) || 0);
                const isC = total >= 15 || j.goleiro;
                const idade = calcularIdade(j.nascimento);
                const html = `<li class="player-item ${isC ? 'bg-confirmado' : 'bg-espera'}" onclick="abrirEdicao('${j.id}')">
                    <div><strong>${j.nome}</strong> ${idade ? `(${idade}a)` : ''}</div>
                    <div style="font-weight:bold; color:var(--accent)">${isC ? 'R$ ' + total.toFixed(2) : '---'}</div>
                </li>`;
                if (isC) { lc.innerHTML += html; c++; } else { le.innerHTML += html; e++; }
            });
            document.getElementById('tituloConfirmados').innerText = `Confirmados (${c})`;
            document.getElementById('tituloEspera').innerText = `Lista de Espera / Cadastro (${e})`;
        }

       // Altera o texto do botão ao abrir o modal
function abrirEdicao(id) {
    const j = listaJogadores.find(x => x.id === id);
    const total = (parseFloat(j.valorPago) || 0) + (parseFloat(j.valorPago2) || 0);
    const isConfirmado = total >= 15 || j.goleiro;

    document.getElementById('editId').value = id;
    document.getElementById('m-nome').value = j.nome;
    document.getElementById('m-nasc').value = j.nascimento || "";
    document.getElementById('m-nivel').value = j.nivel || 3;
    document.getElementById('m-valor').value = j.valorPago || "";
    document.getElementById('m-forma').value = j.forma || "Pix";
    document.getElementById('m-valor2').value = j.valorPago2 || "";
    document.getElementById('m-forma2').value = j.forma2 || "";
    document.getElementById('m-goleiro').checked = j.goleiro || false;

    // Lógica do Botão Dinâmico
    const btn = document.getElementById('btn-excluir-dinamico');
    if (isConfirmado) {
        btn.innerText = "🚫 REMOVER DOS CONFIRMADOS";
        btn.style.background = "#f39c12"; // Cor laranja para diferenciar
    } else {
        btn.innerText = "🗑️ EXCLUIR DO BANCO";
        btn.style.background = "var(--danger)";
    }

    document.getElementById('modalPagamento').style.display = 'flex';
}

// Decide se zera o pagamento ou deleta o documento
async function acaoExcluirDinamica() {
    const id = document.getElementById('editId').value;
    const j = listaJogadores.find(x => x.id === id);
    const total = (parseFloat(j.valorPago) || 0) + (parseFloat(j.valorPago2) || 0);
    const isConfirmado = total >= 15 || j.goleiro;

    if (isConfirmado) {
        // Apenas remove da lista de confirmados zerando os dados de hoje
        if (confirm(`Remover ${j.nome} da lista de confirmados? (Os valores serão zerados)`)) {
            await db.collection("jogadores").doc(id).update({
                valorPago: 0,
                forma: "",
                valorPago2: 0,
                forma2: "",
                goleiro: false
            });
            fecharModal();
        }
    } else {
        // Exclui permanentemente do Firebase
        if (confirm(`Deseja EXCLUIR ${j.nome} permanentemente do banco de dados?`)) {
            await db.collection("jogadores").doc(id).delete();
            fecharModal();
        }
    }
}

        async function salvarTudo() {
            const id = document.getElementById('editId').value;
            await db.collection("jogadores").doc(id).update({
                nome: document.getElementById('m-nome').value,
                nascimento: document.getElementById('m-nasc').value,
                nivel: parseInt(document.getElementById('m-nivel').value),
                valorPago: parseFloat(document.getElementById('m-valor').value) || 0,
                forma: document.getElementById('m-forma').value,
                valorPago2: parseFloat(document.getElementById('m-valor2').value) || 0,
                forma2: document.getElementById('m-forma2').value,
                goleiro: document.getElementById('m-goleiro').checked
            });
            fecharModal();
        }

        async function excluirJogador() {
            const id = document.getElementById('editId').value;
            if (confirm("Deseja EXCLUIR este jogador permanentemente do banco?")) {
                await db.collection("jogadores").doc(id).delete();
                fecharModal();
            }
        }

        function fecharModal() { document.getElementById('modalPagamento').style.display = 'none'; }

        async function limparPagamentos() {
            if (!confirm("Zerar todos os pagamentos de hoje?")) return;
            const batch = db.batch();
            listaJogadores.forEach(j => batch.update(db.collection("jogadores").doc(j.id), { valorPago: 0, forma: "", valorPago2: 0, forma2: "", goleiro: false }));
            await batch.commit();
        }

        function sortear() {
            const ativos = listaJogadores.filter(j => ((parseFloat(j.valorPago) || 0) + (parseFloat(j.valorPago2) || 0)) >= 15 || j.goleiro);
            const total = ativos.length;

            if (total < 7) return alert("Mínimo 7 jogadores confirmados para sortear pelo menos 1 time!");

            // Lógica para calcular quantidade de times respeitando o limite de 7 a 9
            // Se total for 14-18 -> 2 times | 21-27 -> 3 times, etc.
            // Usamos Math.floor(total / 7) para ver o máximo de times possíveis com pelo menos 7 pessoas
            let qtdTimes = Math.floor(total / 7);
            
            // Mas também não podemos ter mais times do que o limite superior (9 por time)
            // Se total / qtdTimes > 9, precisamos aumentar o número de times (se possível)
            if (total / qtdTimes > 9) {
                qtdTimes = Math.ceil(total / 9);
            }

            const configTimes = [
                { nome: "Verde", cor: "#27ae60" },
                { nome: "Amarelo", cor: "#f1c40f" },
                { nome: "Vermelho", cor: "#e74c3c" },
                { nome: "Roxo", cor: "#9b59b6" },
                { nome: "Laranja", cor: "#e67e22" }
            ];

            timesAtuais = Array.from({ length: qtdTimes }, (_, i) => ({ 
                nome: `Time ${configTimes[i].nome}`, 
                cor: configTimes[i].cor, 
                membros: [], 
                somaNivel: 0, 
                idades: [] 
            }));

            const gols = ativos.filter(j => j.goleiro).sort(() => Math.random() - 0.5);
            const linha = ativos.filter(j => !j.goleiro).sort((a, b) => b.nivel - a.nivel);

            // Distribuir Goleiros
            gols.forEach((g, i) => { 
                if (timesAtuais[i % qtdTimes]) { 
                    timesAtuais[i % qtdTimes].membros.push("🧤 " + g.nome); 
                    const id = calcularIdade(g.nascimento); 
                    if (id) timesAtuais[i % qtdTimes].idades.push(id); 
                } 
            });

            // Distribuir Linha equilibrando nível e quantidade
            linha.forEach(l => {
                timesAtuais.sort((a, b) => a.membros.length - b.membros.length || a.somaNivel - b.somaNivel);
                timesAtuais[0].membros.push("⚽ " + l.nome);
                timesAtuais[0].somaNivel += l.nivel;
                const id = calcularIdade(l.nascimento); 
                if (id) timesAtuais[0].idades.push(id);
            });

            const box = document.getElementById('times');
            box.innerHTML = `<h3>Times Sorteados (${total} jogadores)</h3>`;
            timesAtuais.forEach(t => {
                const medI = t.idades.length ? (t.idades.reduce((a, b) => a + b) / t.idades.length).toFixed(1) : 'N/A';
                const forca = (t.somaNivel / (t.membros.length || 1)).toFixed(1);
                box.innerHTML += `<div class="card-time" style="border-left:10px solid ${t.cor}">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <strong style="color:${t.cor}">${t.nome}</strong>
                        <div>
                            <span class="badge-info">👥 ${t.membros.length} Jogs</span>
                            <span class="badge-info">🎂 ${medI}a</span> 
                            <span class="badge-info">⭐ ${forca}</span>
                        </div>
                    </div>
                    <div style="margin-top:8px; font-size:0.85rem;">${t.membros.join('<br>')}</div>
                </div>`;
            });
        }

        function renderizarTimes() {
            const div = document.getElementById('times');
            div.innerHTML = "<h2 style='margin-top:20px; text-align:center;'>Equipes Sorteadas</h2>";

            timesAtuais.forEach(t => {
                let card = `
            <div style="background:${t.corFundo}; padding:15px; border-radius:12px; margin:15px 0; border-left:8px solid ${t.corBorda}; box-shadow: 0 2px 5px rgba(0,0,0,0.05)">
                <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid rgba(0,0,0,0.1); padding-bottom:5px;">
                    <strong style="font-size:1.1rem; color:#333;">TIME ${t.nome.toUpperCase()}</strong>
                    <span style="background:white; padding:2px 8px; border-radius:10px; font-size:0.8rem; font-weight:bold;">
                        ${t.membros.length} Jogadores
                    </span>
                </div>
                <ul style="margin-top:10px; list-style:none; font-size:0.95rem;">
                    ${t.membros.map(m => `<li style="padding:3px 0;">• ${m}</li>`).join('')}
                </ul>
                <div style="margin-top:8px; font-size:0.7rem; color:#666; text-align:right;">
                    Força Técnica: ${t.somaNivel} pts
                </div>
            </div>`;
                div.innerHTML += card;
            });
        }
        
        function gerarPDF() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            const dataF = new Date().toLocaleDateString('pt-BR');
            doc.text(`Relatório Financeiro - ${dataF}`, 14, 20);

            let tPix = 0, tDin = 0, tCre = 0, tGer = 0;
            const body = listaJogadores.filter(j => (j.valorPago + j.valorPago2) > 0).map(j => {
                const v1 = j.valorPago, v2 = j.valorPago2, f1 = j.forma, f2 = j.forma2;
                [{ v: v1, f: f1 }, { v: v2, f: f2 }].forEach(p => {
                    if (p.f === "Pix") tPix += p.v; else if (p.f === "Dinheiro") tDin += p.v; else if (p.f === "Crédito") tCre += p.v;
                });
                tGer += (v1 + v2);
                return [j.nome, f2 ? `${f1}: R$${v1} | ${f2}: R$${v2}` : `${f1}: R$${v1}`, `R$ ${(v1 + v2).toFixed(2)}`];
            });

            doc.autoTable({
                startY: 25, head: [['Jogador', 'Forma de Pagamento', 'Total']], body: body,
                didParseCell: (data) => {
                    if (data.section === 'body' && data.column.index === 1 && data.cell.raw.includes("Crédito")) {
                        data.cell.styles.textColor = [231, 76, 60];
                        data.cell.styles.fontStyle = 'bold';
                    }
                }
            });

            doc.autoTable({
                startY: doc.lastAutoTable.finalY + 10,
                head: [['Modalidade', 'Total']],
                body: [['PIX', `R$ ${tPix.toFixed(2)}`], ['DINHEIRO', `R$ ${tDin.toFixed(2)}`], ['CRÉDITO', `R$ ${tCre.toFixed(2)}`], ['TOTAL GERAL', `R$ ${tGer.toFixed(2)}`]],
                theme: 'striped', headStyles: { fillColor: [44, 62, 80] }
            });
            doc.save(`Financeiro_Pelada_${dataF}.pdf`);
        }

        function enviarWhatsApp() {
            if (!timesAtuais.length) return alert("Sorteie primeiro!");
            const agora = new Date();
            let msg = `*⚽ TIMES SORTEADOS - ${agora.toLocaleDateString()} às ${agora.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}*\n\n`;
            timesAtuais.forEach(t => {
                const medI = t.idades.length ? (t.idades.reduce((a, b) => a + b) / t.idades.length).toFixed(1) : 'N/A';
                msg += `*${t.nome.toUpperCase()}* (⭐${(t.somaNivel / t.membros.length).toFixed(1)} | 🎂${medI}a)\n${t.membros.join('\n')}\n\n`;
            });
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>

</html>
