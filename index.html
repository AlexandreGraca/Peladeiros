       .time li {
  padding: 8px 0; /* Aumentei um pouco o padding para o nome respirar */
  border-bottom: 1px solid rgba(0, 0, 0, 0.1); /* Linha divisória sutil */
  list-style: none;
  text-align: center;
}

/* Remove a linha do último nome para ficar mais limpo */
.time li:last-child {
  border-bottom: none;
}
      /* Cores dos times */

        background-color: #d4edda;

  <body>
     <!-- Início da Logo -->
  <div style="text-align: center; margin-bottom: 20px;">

    <h1>Sorteio de Times para a Pelada</hHeading>
    <p id="data-sorteio" style="font-weight: bold; color: #555;"></p>
    <p>Coloque um nome por linha ou cole uma lista de nomes.</p>

    <textarea
      id="jogadores"
      placeholder="Ex:&#10;João&#10;Maria&#10;Pedro&#10;..."
      rows="12"
    ></textarea>
    <button onclick="sortearTimes()">Sortear Times</button>

    <div id="resultado" class="resultado"></div>

    <script>
      function exibirData() {
  const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  const dataAtual = new Date().toLocaleDateString('pt-BR', options);
  
  // Capitaliza a primeira letra do dia da semana
  const dataFormatada = dataAtual.charAt(0).toUpperCase() + dataAtual.slice(1);
  
  document.getElementById('data-sorteio').innerText = `${dataFormatada}`;
}

// Chame a função quando a página carregar
window.onload = exibirData;
      
      const COR_TIME = {
        VERDE: "Verde",
        AMARELO: "Amarelo",
        VERMELHO: "Vermelho",
        ROXO: "Roxo",
      };

      // Embaralha array (Fisher–Yates)
      function shuffle(array) {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      // Transforma texto colado em lista de jogadores
      function parseJogadores(texto) {
  return texto
    .trim()
    .split(/\n/)
    .map((linha) => linha.trim())
    .filter((linha) => linha !== "")
    .map((linha) => {
      // 1. Remove qualquer número e ponto ([ \d\. ]+)
      // 2. Remove qualquer caractere que não seja letra, espaço ou acento ([^\w\sÀ-ú])
      // 3. Remove espaços extras no início/fim
      return linha
        .replace(/[\d\.]+/g, '') 
        .replace(/[^\w\sÀ-ú]/g, '')
        .trim();
    })
    .filter((nome) => nome !== ""); // Remove linhas que ficaram vazias após a limpeza
}

      function sortearTimes() {
        const textarea = document.getElementById("jogadores");
        const listaNomes = parseJogadores(textarea.value);

        if (listaNomes.length < 3) {
          alert("Mínimo 3 jogadores!");
          return;
        }

        const minPorTime = 8;
        const maxPorTime = 9;
        const totalTimes = Math.min(4, Math.ceil(listaNomes.length / minPorTime));

        const shuffled = shuffle(listaNomes.map((nome) => ({ nome })));

        const times = Array.from({ length: totalTimes }, (_, i) => {
          const cor =
            i === 0
              ? COR_TIME.VERDE
              : i === 1
                ? COR_TIME.AMARELO
                : i === 2
                  ? COR_TIME.VERMELHO
                  : COR_TIME.ROXO;
          return { cor, jogadores: [] };
        });

        const reservas = [];

        let idxTime = 0;
        for (const jogador of shuffled) {
          const time = times[idxTime];
          if (time.jogadores.length < maxPorTime) {
            time.jogadores.push(jogador);
          } else {
            reservas.push(jogador);
          }
          idxTime = (idxTime + 1) % totalTimes;
        }

        renderResultado(times, reservas);
      }

      function renderResultado(times, reservas) {
        const divResultado = document.getElementById("resultado");
        divResultado.innerHTML = "";

        times.forEach((time) => {
          const div = document.createElement("div");
          div.className = `time time-${time.cor.toLowerCase()}`;
          div.innerHTML = `
  <h3>${time.cor} (${time.jogadores.length})</h3>
  <ul>
    ${time.jogadores
      .map((j) => `<li>${j.nome}</li>`)
      .join("")}
  </ul>
`;
          divResultado.appendChild(div);
        });

        if (reservas.length > 0) {
          const divReservas = document.createElement("div");
          divReservas.className = "time time-reserva";
          divReservas.innerHTML = `
            <h3>Reservas</h3>
            <ul>
              ${reservas.map((j) => `<li>${j.nome}</li>`).join("")}
            </ul>
          `;
          divResultado.appendChild(divReservas);
        }
      }
    </script>
    <button onclick="enviarWhatsApp()" style="background-color: #075e54;">
  Enviar no WhatsApp
</button>

<script>
function enviarWhatsApp() {
    const dataHoje = new Date().toLocaleDateString('pt-BR', { 
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
    });

    // Usamos \n em vez de %0A para melhor compatibilidade com o encodeURIComponent
    let texto = `⚽ *Sorteio da Pelada - ${dataHoje}* ⚽\n\n`;
    
    const containers = document.querySelectorAll('.time');
    
    containers.forEach(c => {
        const titulo = c.querySelector('h3').innerText;
        // Pegamos os nomes da lista
        const nomes = Array.from(c.querySelectorAll('li')).map(li => li.innerText);
        
        // Adicionamos o título em negrito (com asterisco de fechamento) e a lista
        texto += `*${titulo}*\n${nomes.join(', ')}\n\n`;
    });

    // encodeURIComponent codifica corretamente os caracteres para a URL do WhatsApp
    window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`, '_blank');
}
</script>
