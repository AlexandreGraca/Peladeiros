    <style>
        :root {
            --primary: #2c3e50;
            --accent: #27ae60;
            --danger: #e74c3c;
            --waiting: #3498db;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 10px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            position: relative;
        }

        .logo {
            max-width: 60px;
            border-radius: 50%;
        }

        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .search-box input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
        }

        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .player-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid #eee;
            transition: 0.2s;
        }

        .bg-confirmado {
            background: #e8f5e9;
            border-left: 5px solid var(--accent);
        }

        .bg-espera {
            background: #fff;
            border-left: 5px solid #bdc3c7;
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-action {
            padding: 12px;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .btn-whatsapp-send {
            background: #25d366;
            grid-column: span 2;
        }

        .btn-pdf {
            background: var(--danger);
        }

        .btn-draw {
            background: var(--waiting);
        }

        .btn-clear {
            background: #95a5a6;
            grid-column: span 2;
            margin-top: 5px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .auth-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .card-time {
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            background: #fff;
            border: 1px solid #ddd;
        }

        .badge-info {
            font-size: 0.7rem;
            background: #eee;
            padding: 3px 8px;
            border-radius: 10px;
            color: #555;
            font-weight: bold;
            margin-right: 4px;
        }
    </style>
</head>

<body>

    <div id="auth-container"
    style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#1a1a1a; gap:20px;">
    
    <!-- Logo acima do botão -->
    <img src="https://i.imgur.com/zSl9YOk.jpeg" 
         alt="Logo Peladeiros"

    <button onclick="loginGoogle()"

    <div id="app-main" class="container" style="display:none;">
        <header>
    <img src="https://i.imgur.com/zSl9YOk.jpeg" class="logo">
    <h1 style="font-size: 1.2rem; margin: 5px 0 0 0;">⚽ Sorteio ⚽</h1>
    <!-- Elemento onde a data será exibida -->
    <p id="data-topo" style="font-size: 0.85rem; color: #7f8c8d; font-weight: bold; margin-top: 5px; text-transform: capitalize;"></p>
    
    <button onclick="logout()"
        style="position:absolute; right:0; top:0; background:none; border:none; color:red; cursor:pointer; font-size:0.7rem;">Sair</button>
</header>

        <div class="search-box">
            <input type="text" id="inNome" placeholder="Nome do novo jogador...">
            <button class="btn-add" onclick="cadastrarNovo()">+</button>
        </div>

        <h3 id="tituloEspera">Lista de Espera / Cadastro (0)</h3>
        <ul id="listaEspera" style="list-style:none; padding:0;"></ul>        
        
        <h3 id="tituloConfirmados">Confirmados (0)</h3>

        <div class="actions">
            <button class="btn-action btn-draw" onclick="sortear()">🤞 Sortear Times</button>
            <button class="btn-action btn-pdf" onclick="gerarPDF()">📄 Relatório PDF</button>
            <button class="btn-action btn-whatsapp-send" onclick="enviarWhatsApp()">📨 Enviar Times WhatsApp</button>

    <!-- Modal Edição -->
    <div class="modal" id="modalPagamento">

    <!-- BOTÃO GOLEIRO AO INVÉS DE CHECKBOX -->

                ALTERAÇÕES</button>
            <button id="btn-excluir-dinamico" onclick="acaoExcluirDinamica()"

    🗑️ EXCLUIR

            <button onclick="fecharModal()"

    <script>
        const firebaseConfig = { apiKey: "AIzaSyC9VtX2SWiCtAPtLx6WGmVwUMA-EX_zuAY", authDomain: "dbpeladeiros.firebaseapp.com", projectId: "dbpeladeiros", storageBucket: "dbpeladeiros.firebasestorage.app", messagingSenderId: "460398325975", appId: "1:460398325975:web:b382791c2d132d1a3d0092" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let listaJogadores = []; let timesAtuais = [];

        function loginGoogle() { firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function logout() { firebase.auth().signOut(); window.location.reload(); }

        firebase.auth().onAuthStateChanged(u => {
            if (u) { document.getElementById('auth-container').style.display = 'none'; document.getElementById('app-main').style.display = 'block'; ouvirBanco(); }
        });

        function ouvirBanco() {
            db.collection("jogadores").orderBy("nome").onSnapshot(snap => {
                listaJogadores = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderizar();
            });
        }

        async function cadastrarNovo() {
            const n = document.getElementById('inNome').value.trim();
            if (!n) return;
            if (listaJogadores.some(j => j.nome.toLowerCase() === n.toLowerCase())) {
                alert("Erro: Este jogador já está cadastrado!"); return;
            }
            await db.collection("jogadores").add({ nome: n, valorPago: 0, forma: "", valorPago2: 0, forma2: "", goleiro: false, nivel: 3, nascimento: "" });
            document.getElementById('inNome').value = "";
        }

        function calcularIdade(data) {
            if (!data) return null;
            const nasc = new Date(data); const hoje = new Date();
            let idade = hoje.getFullYear() - nasc.getFullYear();
            if (hoje.getMonth() < nasc.getMonth() || (hoje.getMonth() === nasc.getMonth() && hoje.getDate() < nasc.getDate())) idade--;
            return idade;
        }

        function renderizar() {
    const lc = document.getElementById('listaConfirmados');
    const le = document.getElementById('listaEspera');
    lc.innerHTML = ""; le.innerHTML = "";
    let c = 0, e = 0;

    listaJogadores.forEach(j => {
        const total = (parseFloat(j.valorPago) || 0) + (parseFloat(j.valorPago2) || 0);
        const isC = total >= 15 || j.goleiro;
        const idade = calcularIdade(j.nascimento);
        
        // Adiciona o emoji de luva se for goleiro
        const prefixoGoleiro = j.goleiro ? "🧤 " : "";
        
        const html = `<li class="player-item ${isC ? 'bg-confirmado' : 'bg-espera'}" onclick="abrirEdicao('${j.id}')">
            <div><strong>${prefixoGoleiro}${j.nome}</strong> ${idade ? `(${idade}a)` : ''}</div>
            <div style="font-weight:bold; color:var(--accent)">${isC ? 'R$ ' + total.toFixed(2) : '---'}</div>
        </li>`;

        if (isC) { 
            lc.innerHTML += html; 
            c++; 
        } else { 
            le.innerHTML += html; 
            e++; 
        }
    });
    
    document.getElementById('tituloConfirmados').innerText = `Confirmados (${c})`;
    document.getElementById('tituloEspera').innerText = `Lista de Espera / Cadastro (${e})`;
}
function toggleGoleiro() {
    const btn = document.getElementById('btn-goleiro-toggle');
    const input = document.getElementById('m-goleiro-status');
    const isGoleiro = input.value === "true";

    if (isGoleiro) {
        input.value = "false";
        btn.innerText = "🧤 GOLEIRO FIXO: NÃO";
        btn.style.background = "white";
        btn.style.color = "#333";
        btn.style.borderColor = "#ddd";
    } else {
        input.value = "true";
        btn.innerText = "🧤 GOLEIRO FIXO: SIM";
        // Fundo amarelo como solicitado
        btn.style.background = "#f1c40f"; 
        btn.style.color = "#000";
        btn.style.borderColor = "#f1c40f";
        
        // Isenção de pagamento automática ao marcar goleiro
        document.getElementById('m-valor').value = 0;
        document.getElementById('m-valor2').value = 0;
    }
}        

       // Altera o texto do botão ao abrir o modal
function abrirEdicao(id) {
    const j = listaJogadores.find(x => x.id === id);
    const total = (parseFloat(j.valorPago) || 0) + (parseFloat(j.valorPago2) || 0);
    const isConfirmado = total >= 15 || j.goleiro;

    document.getElementById('editId').value = id;
    document.getElementById('m-nome').value = j.nome;
    document.getElementById('m-nasc').value = j.nascimento || "";
    document.getElementById('m-nivel').value = j.nivel || 3;
    document.getElementById('m-valor').value = j.valorPago || "";
    document.getElementById('m-forma').value = j.forma || "Pix";
    document.getElementById('m-valor2').value = j.valorPago2 || "";
    document.getElementById('m-forma2').value = j.forma2 || "";
    
    // Configura o botão de goleiro baseado no dado do banco
    const inputGoleiro = document.getElementById('m-goleiro-status');
    inputGoleiro.value = j.goleiro ? "true" : "false";
    const btnGoleiro = document.getElementById('btn-goleiro-toggle');
    
    if (j.goleiro) {
        btnGoleiro.innerText = "🧤 GOLEIRO FIXO: SIM";
        btnGoleiro.style.background = "var(--primary)";
        btnGoleiro.style.color = "white";
        btnGoleiro.style.borderColor = "var(--primary)";
    } else {
        btnGoleiro.innerText = "🧤 GOLEIRO FIXO: NÃO";
        btnGoleiro.style.background = "white";
        btnGoleiro.style.color = "#333";
        btnGoleiro.style.borderColor = "#ddd";
    }

    const btnExcluir = document.getElementById('btn-excluir-dinamico');
    if (isConfirmado) {
        btnExcluir.innerText = "🚫 REMOVER DOS CONFIRMADOS";
        btnExcluir.style.background = "#f39c12";
    } else {
        btnExcluir.innerText = "🗑️ EXCLUIR DO BANCO";
        btnExcluir.style.background = "var(--danger)";
    }

    document.getElementById('modalPagamento').style.display = 'flex';
}

// Atualize a função salvarTudo para pegar o valor do campo oculto
async function salvarTudo() {
    const id = document.getElementById('editId').value;
    const isGoleiro = document.getElementById('m-goleiro-status').value === "true";
    
    try {
        await db.collection("jogadores").doc(id).update({
            nome: document.getElementById('m-nome').value,
            nascimento: document.getElementById('m-nasc').value,
            nivel: parseInt(document.getElementById('m-nivel').value),
            valorPago: parseFloat(document.getElementById('m-valor').value) || "",
            forma: document.getElementById('m-forma').value,
            valorPago2: parseFloat(document.getElementById('m-valor2').value) || "",
            forma2: document.getElementById('m-forma2').value,
            goleiro: isGoleiro
        });
        fecharModal();
    } catch (error) {
        console.error("Erro ao salvar:", error);
        alert("Erro ao Salvar Alterações.");
    }
}        
// Decide se zera o pagamento ou deleta o documento
async function acaoExcluirDinamica() {
    const id = document.getElementById('editId').value;
    const j = listaJogadores.find(x => x.id === id);
    const total = (parseFloat(j.valorPago) || 0) + (parseFloat(j.valorPago2) || 0);
    const isConfirmado = total >= 15 || j.goleiro;

    if (isConfirmado) {
        // Apenas remove da lista de confirmados zerando os dados de hoje
        if (confirm(`Remover ${j.nome} da lista de confirmados? (Os valores serão zerados)`)) {
            await db.collection("jogadores").doc(id).update({
                valorPago: 0,
                forma: "",
                valorPago2: 0,
                forma2: "",
                goleiro: false
            });
            fecharModal();
        }
    } else {
        // Exclui permanentemente do Firebase
        if (confirm(`Deseja EXCLUIR ${j.nome} permanentemente do banco de dados?`)) {
            await db.collection("jogadores").doc(id).delete();
            fecharModal();
        }
    }
}

        async function excluirJogador() {
            const id = document.getElementById('editId').value;
            if (confirm("Deseja EXCLUIR este jogador permanentemente do banco?")) {
                await db.collection("jogadores").doc(id).delete();
                fecharModal();
            }
        }

        function fecharModal() { document.getElementById('modalPagamento').style.display = 'none'; }

        async function limparPagamentos() {
            if (!confirm("Zerar todos os pagamentos de hoje?")) return;
            const batch = db.batch();
            listaJogadores.forEach(j => batch.update(db.collection("jogadores").doc(j.id), { valorPago: 0, forma: "", valorPago2: 0, forma2: "", goleiro: false }));
            await batch.commit();
        }

   function sortear() {
    const ativos = listaJogadores.filter(j => ((parseFloat(j.valorPago) || 0) + (parseFloat(j.valorPago2) || 0)) >= 15 || j.goleiro);
    const total = ativos.length;

    // Ajustado o mínimo para 22 jogadores, já que os times agora são de 11
    if (total < 22) return alert("Mínimo 22 jogadores confirmados para sortear times de 11!");

    // Define a quantidade de times baseada em 11 jogadores por time
    let qtdTimes = Math.floor(total / 11);
    if (qtdTimes < 2) qtdTimes = 2; // Garante pelo menos 2 times se houverem jogadores suficientes

    const configTimes = [
        { nome: "Verde", cor: "#27ae60" },
        { nome: "Amarelo", cor: "#f1c40f" },
        { nome: "Vermelho", cor: "#e74c3c" },
        { nome: "Roxo", cor: "#9b59b6" },
        { nome: "Laranja", cor: "#e67e22" }
    ];

    // Limita a quantidade de times ao máximo de cores configuradas para não dar undefined
    if (qtdTimes > configTimes.length) qtdTimes = configTimes.length;

    timesAtuais = Array.from({ length: qtdTimes }, (_, i) => ({ 
        nome: configTimes[i].nome, 
        cor: configTimes[i].cor, 
        membros: [], 
        somaNivel: 0, 
        somaIdade: 0,
        idades: [] 
    }));

    // Separa Goleiros e Linha
    const gols = ativos.filter(j => j.goleiro).sort(() => Math.random() - 0.5);
    
    // ORDENAÇÃO POR RANKING (Nível de habilidade como peso principal, Idade como secundário)
    const linha = ativos.filter(j => !j.goleiro).sort((a, b) => {
        if (b.nivel !== a.nivel) {
            return b.nivel - a.nivel; 
        }
        const idadeA = calcularIdade(a.nascimento) || 30;
        const idadeB = calcularIdade(b.nascimento) || 30;
        return idadeB - a.nascimento ? idadeB - idadeA : 0;
    });

    // 1. Distribuir Goleiros
    gols.forEach((g, i) => { 
        const tIdx = i % qtdTimes;
        timesAtuais[tIdx].membros.push("🧤 " + g.nome); 
        const id = calcularIdade(g.nascimento); 
        if (id) {
            timesAtuais[tIdx].idades.push(id);
            timesAtuais[tIdx].somaIdade += id;
        }
    });

    // 2. Distribuir Linha (Algoritmo de "Serpente" para equilíbrio)
    linha.forEach(l => {
        // Ordena os times para dar o jogador ao time que está com menos membros ou mais fraco
        timesAtuais.sort((a, b) => {
            return (a.membros.length - b.membros.length) || 
                   (a.somaNivel - b.somaNivel) || 
                   (a.somaIdade - b.somaIdade);
        });

        // Segurança extra: verifica se o time alvo existe antes de empurrar os dados
        if (timesAtuais[0]) {
            timesAtuais[0].membros.push("⚽ " + l.nome);
            timesAtuais[0].somaNivel += l.nivel;
            const id = calcularIdade(l.nascimento) || 30;
            timesAtuais[0].idades.push(id);
            timesAtuais[0].somaIdade += id;
        }
    });

    // Renderização no HTML
    const box = document.getElementById('times');
    box.innerHTML = `<h3>Times Sorteados (${total} jogadores)</h3>`;
    timesAtuais.forEach(t => {
        const medI = t.idades.length ? (t.somaIdade / t.idades.length).toFixed(1) : 'N/A';
        const forca = (t.somaNivel / (t.membros.length || 1)).toFixed(1);
        box.innerHTML += `
            <div class="card-time" style="border-left:10px solid ${t.cor}">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <strong style="color:${t.cor}">${t.nome}</strong>
                    <div>
                        <span class="badge-info">👥 ${t.membros.length} Jogs</span>
                        <span class="badge-info">🎂 Méd: ${medI}a</span> 
                        <span class="badge-info">⭐ Força: ${forca}</span>
                    </div>
                </div>
                <div style="margin-top:8px; font-size:0.85rem;">${t.membros.join('<br>')}</div>
            </div>`;
    });
}

       function gerarPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const dataF = new Date().toLocaleDateString('pt-BR');
    
    doc.setFontSize(16);
    doc.text(`Relatório Financeiro - ${dataF}`, 14, 20);

    let tPix = 0, tDin = 0, tCre = 0, tGer = 0;

    // Filtra apenas quem pagou algo ou é goleiro
    const pagantes = listaJogadores.filter(j => 
        (parseFloat(j.valorPago) || 0) + (parseFloat(j.valorPago2) || 0) > 0
    );

    if (pagantes.length === 0) {
        alert("Não há pagamentos registrados para gerar o relatório.");
        return;
    }

    const body = pagantes.map(j => {
        const v1 = parseFloat(j.valorPago) || 0;
        const v2 = parseFloat(j.valorPago2) || 0;
        const f1 = j.forma || "Não inf.";
        const f2 = j.forma2 || "";
        const totalIndividual = v1 + v2;

        // Soma para os totais do rodapé
        [ {v: v1, f: f1}, {v: v2, f: f2} ].forEach(p => {
            if (p.f === "Pix") tPix += p.v;
            else if (p.f === "Dinheiro") tDin += p.v;
            else if (p.f === "Crédito") tCre += p.v;
        });

        tGer += totalIndividual;

        return [
            j.nome, 
            f2 ? `${f1}: R$${v1.toFixed(2)} | ${f2}: R$${v2.toFixed(2)}` : `${f1}: R$${v1.toFixed(2)}`, 
            `R$ ${totalIndividual.toFixed(2)}`
        ];
    });

    doc.autoTable({
        startY: 25,
        head: [['Jogador', 'Forma de Pagamento', 'Total']],
        body: body,
        headStyles: { fillColor: [44, 62, 80] },
        didParseCell: (data) => {
            if (data.section === 'body' && data.column.index === 1 && data.cell.raw.includes("Crédito")) {
                data.cell.styles.textColor = [231, 76, 60]; // Vermelho para crédito
                data.cell.styles.fontStyle = 'bold';
            }
        }
    });

    // Tabela de resumo final
    doc.autoTable({
        startY: doc.lastAutoTable.finalY + 10,
        head: [['Modalidade', 'Total']],
        body: [
            ['PIX', `R$ ${tPix.toFixed(2)}`],
            ['DINHEIRO', `R$ ${tDin.toFixed(2)}`],
            ['CRÉDITO', `R$ ${tCre.toFixed(2)}`],
            ['TOTAL GERAL', `R$ ${tGer.toFixed(2)}`]
        ],
        theme: 'striped',
        headStyles: { fillColor: [39, 174, 96] } // Verde para o total
    });

    doc.save(`Financeiro_Pelada_${dataF.replace(/\//g, '-')}.pdf`);
}
        function enviarWhatsApp() {
            if (!timesAtuais.length) return alert("Sorteie primeiro!");
            const agora = new Date();
            let msg = `*⚽ TIMES SORTEADOS - ${agora.toLocaleDateString()} às ${agora.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}*\n\n`;
            timesAtuais.forEach(t => {
                const medI = t.idades.length ? (t.idades.reduce((a, b) => a + b) / t.idades.length).toFixed(1) : 'N/A';
                msg += `*${t.nome.toUpperCase()}* (⭐${(t.somaNivel / t.membros.length).toFixed(1)} | 🎂${medI}a)\n${t.membros.join('\n')}\n\n`;
            });
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
        }

function atualizarData() {
        const elementoData = document.getElementById('data-topo');
        const agora = new Date();

        // Opções para formatar a data em português
        const opcoes = { 
            weekday: 'long', 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric' 
        };

        // Formata a data: "segunda-feira, 5 de maio de 2026"
        let dataFormatada = agora.toLocaleDateString('pt-BR', opcoes);

        // Capitalizar a primeira letra
        dataFormatada = dataFormatada.charAt(0).toUpperCase() + dataFormatada.slice(1);

        elementoData.textContent = dataFormatada;
    }

    // Executa a função assim que a página carrega
    window.onload = atualizarData;
