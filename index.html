<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestão Peladeiros - 2026</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <link rel="icon" type="image/jpeg" href="https://i.imgur.com/zSl9YOk.jpeg">

    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
          .then(() => console.log("Service Worker Registrado!"))
          .catch(err => console.log("Erro no SW:", err));
      }
    </script>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --primary: #2c3e50;
            --accent: #27ae60;
            --danger: #e74c3c;
            --waiting: #3498db;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 10px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            position: relative;
        }

        .logo {
            max-width: 60px;
            border-radius: 50%;
        }

        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .search-box input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
        }

        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .player-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid #eee;
            transition: 0.2s;
        }

        .bg-confirmado {
            background: #e8f5e9;
            border-left: 5px solid var(--accent);
        }

        .bg-espera {
            background: #fff;
            border-left: 5px solid #bdc3c7;
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-action {
            padding: 12px;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .btn-whatsapp-send {
            background: #25d366;
            grid-column: span 2;
        }

        .btn-pdf {
            background: var(--danger);
        }

        .btn-draw {
            background: var(--waiting);
        }

        .btn-clear {
            background: #7f8c8d;
            grid-column: span 2;
            margin-top: 5px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .auth-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .card-time {
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            background: #fff;
            border: 1px solid #ddd;
        }

        .badge-info {
            font-size: 0.7rem;
            background: #eee;
            padding: 3px 8px;
            border-radius: 10px;
            color: #555;
            font-weight: bold;
            margin-right: 4px;
        }
    </style>
</head>

<body>

    <div id="auth-container"
        style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#1a1a1a; gap:20px;">
        <img src="https://i.imgur.com/zSl9YOk.jpeg" alt="Logo Peladeiros" style="max-width: 150px; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
        <button onclick="loginGoogle()" style="padding:15px 30px; border-radius:8px; font-weight:bold; cursor:pointer; background: white; border: none; font-size: 1rem;">
            Entrar com Google
        </button>
    </div>

    <div id="app-main" class="container" style="display:none;">
        <header>
            <img src="https://i.imgur.com/zSl9YOk.jpeg" class="logo">
            <h1 style="font-size: 1.2rem; margin: 5px 0 0 0;">⚽ Sorteio ⚽</h1>
            <p id="data-topo" style="font-size: 0.85rem; color: #7f8c8d; font-weight: bold; margin-top: 5px; text-transform: capitalize;"></p>
            <button onclick="logout()" style="position:absolute; right:0; top:0; background:none; border:none; color:red; cursor:pointer; font-size:0.7rem;">Sair</button>
        </header>

        <div class="search-box">
            <input type="text" id="inNome" placeholder="Nome do novo jogador...">
            <button class="btn-add" onclick="cadastrarNovo()">+</button>
        </div>

        <h3 id="tituloEspera">Lista de Espera / Cadastro (0)</h3>
        <ul id="listaEspera" style="list-style:none; padding:0;"></ul>        
        
        <h3 id="tituloConfirmados">Confirmados (0)</h3>
        <ul id="listaConfirmados" style="list-style:none; padding:0;"></ul>

        <div class="actions">
            <button class="btn-action btn-draw" onclick="sortear()">🤞 Sortear Times</button>
            <button class="btn-action btn-pdf" onclick="gerarPDF()">📄 Relatório PDF</button>
            <button class="btn-action btn-whatsapp-send" onclick="enviarWhatsApp()">📨 Enviar Times WhatsApp</button>
            <button class="btn-action btn-clear" onclick="window.location.href='config.html'">⚙️ Configurações do Sistema</button>
        </div>
        <div id="times"></div>
    </div>

    <div class="modal" id="modalPagamento">
        <div class="modal-content">
            <h3 style="margin:0">Dados do Jogador</h3>
            <input type="hidden" id="editId">
            <input type="text" id="m-nome" class="auth-input" placeholder="Nome">
            <input type="date" id="m-nasc" class="auth-input">

            <select id="m-nivel" class="auth-input">
                <option value="5">⭐⭐⭐⭐⭐ (Craque)</option>
                <option value="4">⭐⭐⭐⭐ (Bom)</option>
                <option value="3" selected>⭐⭐⭐ (Médio)</option>
                <option value="2">⭐⭐ (Esforçado)</option>
                <option value="1">⭐ (Perna de Pau)</option>
            </select>

            <label style="font-size:0.75rem; font-weight:bold; margin-top:5px;">Modalidade de Contribuição:</label>
            <select id="m-modalidade" class="auth-input" onchange="atualizarPlaceholderValor()">
                <option value="diaria">📆 Diarista</option>
                <option value="mensalista">💳 Mensalista</option>
            </select>

            <div style="background:#f9f9f9; padding:10px; border-radius:10px; border:1px solid #eee;">
                <div style="text-align: center; margin-bottom: 15px;">
                    <label style="font-size:0.7rem; font-weight:bold; display:block; margin-bottom:5px;">QR CODE PARA PAGAMENTO</label>
                    <img src="https://i.imgur.com/5Dz3zDQ.jpeg" alt="QR Code Pix" style="width: 120px; border-radius: 8px; border: 1px solid #ddd;">
                </div>

                <label style="font-size:0.7rem; font-weight:bold;">Pagamento Principal</label>
                <div style="display:flex; gap:5px; margin-bottom:10px;">
                    <input type="number" id="m-valor" class="auth-input" placeholder="0.00">
                    <select id="m-forma" class="auth-input">
                        <option value="Pix">❖Pix</option>
                        <option value="Dinheiro">💲Dinheiro</option>
                        <option value="Crédito">💳Crédito</option>
                    </select>
                </div>
                
                <label style="font-size:0.7rem; font-weight:bold;">Pagamento Complementar (Opcional)</label>
                <div style="display:flex; gap:5px;">
                    <input type="number" id="m-valor2" class="auth-input" placeholder="0.00">
                    <select id="m-forma2" class="auth-input">
                        <option value="">-</option>
                        <option value="Pix">❖Pix</option>
                        <option value="Dinheiro">💲Dinheiro</option>
                        <option value="Crédito">💳Crédito</option>
                    </select>
                </div>

                <div style="margin-top:15px;">
                    <input type="hidden" id="m-goleiro-status"> 
                    <button id="btn-goleiro-toggle" onclick="toggleGoleiro()" style="width:100%; padding:10px; border-radius:8px; border:2px solid #ddd; font-weight:bold; cursor:pointer; transition: 0.3s;">
                        🧤 GOLEIRO FIXO: NÃO
                    </button>
                </div>
            </div>
            <button onclick="salvarTudo()" style="background:var(--accent); color:white; border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer;">SALVAR ALTERAÇÕES</button>
            <button id="btn-excluir-dinamico" onclick="acaoExcluirDinamica()" style="background:var(--danger); color:white; border:none; padding:10px; border-radius:8px; font-weight:bold; cursor:pointer;">🗑️ EXCLUIR</button>
            <button onclick="fecharModal()" style="background:#eee; border:none; color:#666; padding:10px; border-radius:8px; cursor:pointer; font-weight:bold; margin-top:5px;">CANCELAR</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyC9VtX2SWiCtAPtLx6WGmVwUMA-EX_zuAY", authDomain: "dbpeladeiros.firebaseapp.com", projectId: "dbpeladeiros", storageBucket: "dbpeladeiros.firebasestorage.app", messagingSenderId: "460398325975", appId: "1:460398325975:web:b382791c2d132d1a3d0092" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let listaJogadores = []; let timesAtuais = [];

        let configSistema = {
            taxa: 15,
            mensalidade: 50,
            diaLimite: 10,
            jogadoresPorTime: 11,
            emailsPermitidos: [],
            times: [
                { nome: "Verde", cor: "#27ae60" },
                { nome: "Amarelo", cor: "#f1c40f" },
                { nome: "Vermelho", cor: "#e74c3c" },
                { nome: "Roxo", cor: "#9b59b6" },
                { nome: "Laranja", cor: "#e67e22" }
            ]
        };

        function getMesAnoAtual() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
        }

        function loginGoogle() { firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function logout() { firebase.auth().signOut(); window.location.reload(); }

        firebase.auth().onAuthStateChanged(u => {
            if (u) {
                db.collection("configuracoes").doc("geral").onSnapshot(docConfig => {
                    if (docConfig.exists) {
                        const dados = docConfig.data();
                        configSistema = { ...configSistema, ...dados };
                        if(listaJogadores.length > 0) renderizar();
                    }
                    if (configSistema.emailsPermitidos && configSistema.emailsPermitidos.length > 0) {
                        const emailUsuario = u.email.toLowerCase().trim();
                        const permitido = configSistema.emailsPermitidos.some(e => e.toLowerCase().trim() === emailUsuario);
                        if (!permitido) {
                            alert("Acesso negado.");
                            logout();
                            return;
                        }
                    }
                    document.getElementById('auth-container').style.display = 'none'; 
                    document.getElementById('app-main').style.display = 'block'; 
                }, err => console.error(err));
                ouvirBanco();
            }
        });

        function ouvirBanco() {
            db.collection("jogadores").orderBy("nome").onSnapshot(snap => {
                listaJogadores = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderizar();
            });
        }

        async function cadastrarNovo() {
            const n = document.getElementById('inNome').value.trim();
            if (!n) return;
            if (listaJogadores.some(j => j.nome.toLowerCase() === n.toLowerCase())) {
                alert("Erro: Jogador já cadastrado!"); return;
            }
            await db.collection("jogadores").add({ 
                nome: n, valorPago: 0, forma: "", valorPago2: 0, forma2: "", 
                goleiro: false, nivel: 3, nascimento: "", modalidade: "diaria", mesPago: "", presencaRodada: false
            });
            document.getElementById('inNome').value = "";
        }

        function calcularIdade(data) {
            if (!data) return null;
            const nasc = new Date(data); const hoje = new Date();
            let idade = hoje.getFullYear() - nasc.getFullYear();
            if (hoje.getMonth() < nasc.getMonth() || (hoje.getMonth() === nasc.getMonth() && hoje.getDate() < nasc.getDate())) idade--;
            return idade;
        }

        // Validação se o jogador está confirmado na rodada atual
        function checarConfirmacao(j) {
            if (j.goleiro) return true;
            
            if (j.modalidade === "mensalista") {
                // Mensalista precisa ter o mês atual pago E estar marcado como presente na rodada
                return j.mesPago === getMesAnoAtual() && j.presencaRodada === true;
            } else {
                const total = (parseFloat(j.valorPago) || 0) + (parseFloat(j.valorPago2) || 0);
                return total >= (parseFloat(configSistema.taxa) || 15);
            }
        }

        function renderizar() {
            const lc = document.getElementById('listaConfirmados');
            const le = document.getElementById('listaEspera');
            lc.innerHTML = ""; le.innerHTML = "";
            let c = 0, e = 0;

            listaJogadores.forEach(j => {
                const isC = checarConfirmacao(j);
                const total = (parseFloat(j.valorPago) || 0) + (parseFloat(j.valorPago2) || 0);
                const idade = calcularIdade(j.nascimento);
                const prefixoGoleiro = j.goleiro ? "🧤 " : "";
                
                // Exibe etiqueta contextualizada de "Pago" para mensalistas recorrentes
                const isMensalistaPago = j.modalidade === "mensalista" && j.mesPago === getMesAnoAtual();
                const textoLateral = isMensalistaPago ? "MENSAL PG" : (total > 0 ? 'R$ ' + total.toFixed(2) : '---');
                const rotuloMod = j.modalidade === "mensalista" ? " Mensalista" : " Diarista";
                
                const html = `<li class="player-item ${isC ? 'bg-confirmado' : 'bg-espera'}" onclick="lidarCliqueJogador('${j.id}')">
                    <div><strong>${prefixoGoleiro}${j.nome}</strong> ${idade ? `(${idade}a)` : ''} <span style="font-size:0.7rem; color:#888;">[${rotuloMod}]</span></div>
                    <div style="font-weight:bold; color:var(--accent)">${textoLateral}</div>
                </li>`;

                if (isC) { lc.innerHTML += html; c++; } else { le.innerHTML += html; e++; }
            });
            
            document.getElementById('tituloConfirmados').innerText = `Confirmados (${c})`;
            document.getElementById('tituloEspera').innerText = `Lista de Espera / Cadastro (${e})`;
        }

        // Nova função gerenciadora de cliques: diferência Mensalistas Adimplentes para o clique rápido
        async function lidarCliqueJogador(id) {
            const j = listaJogadores.find(x => x.id === id);
            const isMensalistaPago = j.modalidade === "mensalista" && j.mesPago === getMesAnoAtual();

            if (isMensalistaPago) {
                // Clique Rápido alternando o status de presença na partida
                const novoStatusPresenca = !(j.presencaRodada || false);
                try {
                    await db.collection("jogadores").doc(id).update({
                        presencaRodada: novoStatusPresenca
                    });
                } catch (error) {
                    console.error("Erro ao atualizar presença do mensalista:", error);
                }
            } else {
                // Diaristas ou Mensalistas atrasados/inadimplentes continuam abrindo o modal normalmente
                abrirEdicao(id);
            }
        }

        function atualizarPlaceholderValor() {
            const mod = document.getElementById('m-modalidade').value;
            const p1 = document.getElementById('m-valor');
            if(mod === "mensalista") {
                p1.placeholder = `Min: R$ ${(parseFloat(configSistema.mensalidade) || 50).toFixed(2)}`;
            } else {
                p1.placeholder = `Min: R$ ${(parseFloat(configSistema.taxa) || 15).toFixed(2)}`;
            }
        }

        function abrirEdicao(id) {
            const j = listaJogadores.find(x => x.id === id);

            document.getElementById('editId').value = id;
            document.getElementById('m-nome').value = j.nome;
            document.getElementById('m-nasc').value = j.nascimento || "";
            document.getElementById('m-nivel').value = j.nivel || 3;
            document.getElementById('m-modalidade').value = j.modalidade || "diaria";
            
            document.getElementById('m-valor').value = j.valorPago || "";
            document.getElementById('m-forma').value = j.forma || "Pix";
            document.getElementById('m-valor2').value = j.valorPago2 || "";
            document.getElementById('m-forma2').value = j.forma2 || "";
            
            atualizarPlaceholderValor();

            const inputGoleiro = document.getElementById('m-goleiro-status');
            inputGoleiro.value = j.goleiro ? "true" : "false";
            const btnGoleiro = document.getElementById('btn-goleiro-toggle');
            
            if (j.goleiro) {
                btnGoleiro.innerText = "🧤 GOLEIRO FIXO: SIM";
                btnGoleiro.style.background = "#f1c40f"; btnGoleiro.style.color = "black"; btnGoleiro.style.borderColor = "#f1c40f";
            } else {
                btnGoleiro.innerText = "🧤 GOLEIRO FIXO: NÃO";
                btnGoleiro.style.background = "white"; btnGoleiro.style.color = "#333"; btnGoleiro.style.borderColor = "#ddd";
            }

            const btnExcluir = document.getElementById('btn-excluir-dinamico');
            if (checarConfirmacao(j)) {
                btnExcluir.innerText = "🚫 REMOVER DA RODADA (RESETAR)";
                btnExcluir.style.background = "#f39c12";
            } else {
                btnExcluir.innerText = "🗑️ EXCLUIR DO BANCO";
                btnExcluir.style.background = "var(--danger)";
            }

            document.getElementById('modalPagamento').style.display = 'flex';
        }

        async function salvarTudo() {
            const id = document.getElementById('editId').value;
            const isGoleiro = document.getElementById('m-goleiro-status').value === "true";
            const modSelected = document.getElementById('m-modalidade').value;
            
            const v1 = parseFloat(document.getElementById('m-valor').value) || 0;
            const v2 = parseFloat(document.getElementById('m-valor2').value) || 0;
            const totalDigitado = v1 + v2;

            if (!isGoleiro && totalDigitado > 0) {
                if (modSelected === "mensalista") {
                    const minMensal = parseFloat(configSistema.mensalidade) || 50;
                    if (totalDigitado < minMensal) {
                        alert(`Erro: Para Mensalistas, o valor mínimo exigido configurado é R$ ${minMensal.toFixed(2)}`);
                        return;
                    }
                    
                    const hoje = new Date();
                    const limite = parseInt(configSistema.diaLimite) || 10;
                    if (hoje.getDate() > limite) {
                        const prosseguir = confirm(`Atenção: Passou do dia limite de recebimento (${limite}). Deseja aceitar a mensalidade mesmo assim?`);
                        if (!prosseguir) return;
                    }
                } else {
                    const minDiaria = parseFloat(configSistema.taxa) || 15;
                    if (totalDigitado < minDiaria) {
                        alert(`Erro: Para Diaristas, o valor mínimo por partida configurado é R$ ${minDiaria.toFixed(2)}`);
                        return;
                    }
                }
            }

            try {
                const dadosParaSalvar = {
                    nome: document.getElementById('m-nome').value,
                    nascimento: document.getElementById('m-nasc').value,
                    nivel: parseInt(document.getElementById('m-nivel').value),
                    modalidade: modSelected,
                    valorPago: v1 || "",
                    forma: document.getElementById('m-forma').value,
                    valorPago2: v2 || "",
                    forma2: document.getElementById('m-forma2').value,
                    goleiro: isGoleiro
                };

                if (modSelected === "mensalista" && totalDigitado > 0) {
                    dadosParaSalvar.mesPago = getMesAnoAtual();
                    dadosParaSalvar.presencaRodada = true; // Confirma na rodada logo após pagar
                }

                await db.collection("jogadores").doc(id).update(dadosParaSalvar);
                fecharModal();
            } catch (error) {
                console.error("Erro ao salvar:", error);
                alert("Erro ao Salvar Alterações.");
            }
        }        

        async function acaoExcluirDinamica() {
            const id = document.getElementById('editId').value;
            const j = listaJogadores.find(x => x.id === id);

            if (checarConfirmacao(j)) {
                if (confirm(`Remover confirmação de ${j.nome}? Os valores ou presenças serão limpos.`)) {
                    await db.collection("jogadores").doc(id).update({
                        valorPago: 0, forma: "", valorPago2: 0, forma2: "", goleiro: false, mesPago: "", presencaRodada: false
                    });
                    fecharModal();
                }
            } else {
                if (confirm(`Deseja EXCLUIR ${j.nome} do banco de dados permanentemente?`)) {
                    await db.collection("jogadores").doc(id).delete();
                    fecharModal();
                }
            }
        }

        function fecharModal() { document.getElementById('modalPagamento').style.display = 'none'; }

        function toggleGoleiro() {
            const btn = document.getElementById('btn-goleiro-toggle');
            const input = document.getElementById('m-goleiro-status');
            const isGoleiro = input.value === "true";

            if (isGoleiro) {
                input.value = "false";
                btn.innerText = "🧤 GOLEIRO FIXO: NÃO";
                btn.style.background = "white"; btn.style.color = "#333"; btn.style.borderColor = "#ddd";
            } else {
                input.value = "true";
                btn.innerText = "🧤 GOLEIRO FIXO: SIM";
                btn.style.background = "#f1c40f"; btn.style.color = "#000"; btn.style.borderColor = "#f1c40f";
                document.getElementById('m-valor').value = 0;
                document.getElementById('m-valor2').value = 0;
            }
        }        

        function sortear() {
            const porTime = configSistema.jogadoresPorTime || 11;
            const minJogadores = porTime * 2;

            const ativos = listaJogadores.filter(j => checarConfirmacao(j));
            const total = ativos.length;

            if (total < minJogadores) return alert(`Mínimo ${minJogadores} jogadores confirmados para sortear times de ${porTime}!`);

            let qtdTimes = Math.floor(total / porTime);
            if (qtdTimes < 2) qtdTimes = 2; 

            const configTimes = configSistema.times.filter(t => t.nome && t.nome.trim() !== "");
            if (qtdTimes > configTimes.length) qtdTimes = configTimes.length;

            timesAtuais = Array.from({ length: qtdTimes }, (_, i) => ({ 
                nome: configTimes[i].nome, cor: configTimes[i].cor, membros: [], somaNivel: 0, somaIdade: 0, idades: [] 
            }));

            const gols = ativos.filter(j => j.goleiro).sort(() => Math.random() - 0.5);
            const linha = ativos.filter(j => !j.goleiro).sort((a, b) => {
                if (b.nivel !== a.nivel) return b.nivel - a.nivel; 
                return (calcularIdade(b.nascimento) || 30) - (calcularIdade(a.nascimento) || 30);
            });

            gols.forEach((g, i) => { 
                const tIdx = i % qtdTimes;
                timesAtuais[tIdx].membros.push("🧤 " + g.nome); 
                const id = calcularIdade(g.nascimento); if (id) { timesAtuais[tIdx].idades.push(id); timesAtuais[tIdx].somaIdade += id; }
            });

            linha.forEach(l => {
                timesAtuais.sort((a, b) => (a.membros.length - b.membros.length) || (a.somaNivel - b.somaNivel) || (a.somaIdade - b.somaIdade));
                if (timesAtuais[0]) {
                    timesAtuais[0].membros.push("⚽ " + l.nome);
                    timesAtuais[0].somaNivel += l.nivel;
                    const id = calcularIdade(l.nascimento) || 30;
                    timesAtuais[0].idades.push(id); timesAtuais[0].somaIdade += id;
                }
            });

            const box = document.getElementById('times');
            box.innerHTML = `<h3>Times Sorteados (${total} jogadores)</h3>`;
            timesAtuais.forEach(t => {
                const medI = t.idades.length ? (t.somaIdade / t.idades.length).toFixed(1) : 'N/A';
                const forca = (t.somaNivel / (t.membros.length || 1)).toFixed(1);
                box.innerHTML += `
                    <div class="card-time" style="border-left:10px solid ${t.cor}">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <strong style="color:${t.cor}">${t.nome}</strong>
                            <div>
                                <span class="badge-info">👥 ${t.membros.length} Jogs</span>
                                <span class="badge-info">🎂 Méd: ${medI}a</span> 
                                <span class="badge-info">⭐ Força: ${forca}</span>
                            </div>
                        </div>
                        <div style="margin-top:8px; font-size:0.85rem;">${t.membros.join('<br>')}</div>
                    </div>`;
            });
        }

        function gerarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const dataF = new Date().toLocaleDateString('pt-BR');
            
            doc.setFontSize(16);
            doc.text(`Relatório Financeiro - ${dataF}`, 14, 20);

            let tPix = 0, tDin = 0, tCre = 0, tGer = 0;
            const pagantes = listaJogadores.filter(j => (parseFloat(j.valorPago) || 0) + (parseFloat(j.valorPago2) || 0) > 0);

            if (pagantes.length === 0) { return alert("Não há pagamentos para gerar o relatório."); }

            const body = pagantes.map(j => {
                const v1 = parseFloat(j.valorPago) || 0;
                const v2 = parseFloat(j.valorPago2) || 0;
                const f1 = j.forma || "Não inf.";
                const f2 = j.forma2 || "";
                const total = v1 + v2;

                [ {v: v1, f: f1}, {v: v2, f: f2} ].forEach(p => {
                    if (p.f === "Pix") tPix += p.v;
                    else if (p.f === "Dinheiro") tDin += p.v;
                    else if (p.f === "Crédito") tCre += p.v;
                });
                tGer += total;
                const modalidadeTxt = j.modalidade === "mensalista" ? " (Mensal)" : " (Diária)";
                return [j.nome + modalidadeTxt, f2 ? `${f1}: R$${v1.toFixed(2)} | ${f2}: R$${v2.toFixed(2)}` : `${f1}: R$${v1.toFixed(2)}`, `R$ ${total.toFixed(2)}`];
            });

            doc.autoTable({
                startY: 25,
                head: [['Jogador', 'Detalhamento', 'Total']],
                body: body,
                headStyles: { fillColor: [44, 62, 80] }
            });

            doc.autoTable({
                startY: doc.lastAutoTable.finalY + 10,
                head: [['Modalidade', 'Total']],
                body: [['PIX', `R$ ${tPix.toFixed(2)}`], ['DINHEIRO', `R$ ${tDin.toFixed(2)}`], ['CRÉDITO', `R$ ${tCre.toFixed(2)}`], ['TOTAL GERAL', `R$ ${tGer.toFixed(2)}`]],
                theme: 'striped',
                headStyles: { fillColor: [39, 174, 96] }
            });

            doc.save(`Financeiro_${dataF.replace(/\//g, '-')}.pdf`);
        }

        function enviarWhatsApp() {
            if (!timesAtuais.length) return alert("Sorteie primeiro!");
            const agora = new Date();
            let msg = `*⚽ TIMES SORTEADOS - ${agora.toLocaleDateString()}*\n\n`;
            timesAtuais.forEach(t => {
                const medI = t.idades.length ? (t.idades.reduce((a, b) => a + b) / t.idades.length).toFixed(1) : 'N/A';
                msg += `*${t.nome.toUpperCase()}* (⭐${(t.somaNivel / t.membros.length).toFixed(1)} | 🎂${medI}a)\n${t.membros.join('\n')}\n\n`;
            });
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
        }

        function atualizarData() {
            const elementoData = document.getElementById('data-topo');
            const agora = new Date();
            const opcoes = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            let dataFormatada = agora.toLocaleDateString('pt-BR', opcoes);
            elementoData.textContent = dataFormatada.charAt(0).toUpperCase() + dataFormatada.slice(1);
        }

        window.onload = atualizarData;
    </script>
</body>
